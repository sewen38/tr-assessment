<script>
function crc32(str){var table=window._crcTable;if(!table){table=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));table[n]=c>>>0;}window._crcTable=table;}var crc=0^(-1);for(var i=0;i<str.length;i++){crc=(crc>>>8)^table[(crc^str.charCodeAt(i))&0xff];}return (crc^(-1))>>>0;}
function u16(n){return String.fromCharCode(n&255,(n>>>8)&255)}function u32(n){return String.fromCharCode(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}
function makeZipBlob(filename,content){var data=unescape(encodeURIComponent(content));var name=unescape(encodeURIComponent(filename));var crc=crc32(data);var local='PK\x03\x04'+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+name+data;var central='PK\x01\x02'+u16(20)+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+u16(0)+u16(0)+u16(0)+u32(0)+u32(0)+name;var end='PK\x05\x06'+u16(0)+u16(0)+u16(1)+u16(1)+u32(central.length)+u32(local.length)+u16(0);var zip=local+central+end;var bytes=new Uint8Array(zip.length);for(var i=0;i<zip.length;i++)bytes[i]=zip.charCodeAt(i)&255;return new Blob([bytes],{type:'application/zip'});}
function q(k){return new URL(location.href).searchParams.get(k)||''}
function toast(t){var x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(function(){x.classList.remove('show')},1600)}
var projectMap={'tr-fund-cbi':'土耳其房地产投资基金入籍','tr-fund-e2':'土耳其基金入籍 + 美国E-2后续规划','tr-realestate':'土耳其购房入籍','tr-realestate-cbi':'土耳其购房入籍','tr-realestate-education':'土耳其购房入籍 + 子女教育/华侨生规划','tr-deposit-cbi':'土耳其银行存款入籍','tr-bonds-cbi':'土耳其政府债券入籍'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function inlineMd(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>')}
function mdToHtml(md){var lines=String(md||'').replace(/\r\n/g,'\n').split('\n'),html='',inList=false,inTable=false,table=[];function closeList(){if(inList){html+='</ul>';inList=false}}function closeTable(){if(!inTable)return;html+='<div class="table-wrap"><table>';for(var i=0;i<table.length;i++){var cells=table[i].split('|').slice(1,-1).map(function(c){return c.trim()});if(i===1&&cells.every(function(c){return /^:?-{3,}:?$/.test(c)}))continue;html+='<tr>'+(i===0?cells.map(function(c){return '<th>'+inlineMd(c)+'</th>'}).join(''):cells.map(function(c){return '<td>'+inlineMd(c)+'</td>'}).join(''))+'</tr>'}html+='</table></div>';inTable=false;table=[]}for(var i=0;i<lines.length;i++){var line=lines[i].trimEnd();if(!line){closeList();closeTable();continue}if(/^!\[.*\]\(.+\)$/.test(line)){var im=line.match(/^!\[(.*)\]\((.+)\)$/);if(im){html+='<p style="text-align:center;margin:16px 0"><img src="'+im[2]+'" alt="'+im[1]+'" style="width:100%;max-width:800px;border-radius:12px;border:1px solid #e5e7eb"></p>';continue}}if(/^```/.test(line)){continue}if(/^\|.*\|$/.test(line)){closeList();inTable=true;table.push(line);continue}closeTable();if(/^#{1,6}\s+/.test(line)){closeList();var lv=line.match(/^#{1,6}/)[0].length;html+='<h'+lv+'>'+inlineMd(line.replace(/^#{1,6}\s+/,''))+'</h'+lv+'>';continue}if(/^[-*]\s+/.test(line)){if(!inList){html+='<ul>';inList=true}html+='<li>'+inlineMd(line.replace(/^[-*]\s+/,''))+'</li>';continue}closeList();html+='<p>'+inlineMd(line)+'</p>'}closeList();closeTable();return html}

function calc(){
  var P=parseFloat(document.getElementById('pp').value)||450000;
  var USD=7.20;
  var fees=[
    {n:'合同公证费', u:P*0.00742, d:'P×0.742%'},
    {n:'房产评估费', u:1250, d:'固定'},
    {n:'房产交易税', u:P*0.02, d:'P×2%'},
    {n:'产权限制费', u:P*0.008, d:'P×0.8%'},
    {n:'水电气开通费', u:P*0.002, d:'P×0.2%'},
    {n:'律师费', u:5500, d:'固定/家庭'},
    {n:'POA委托协议', u:600, d:'固定'},
    {n:'文件公证认证', u:3000, d:'固定'},
    {n:'土耳其翻译公证', u:1475, d:'固定'},

    {n:'居留卡申请+签证费', u:105, d:'固定'},
    {n:'入籍申请费', u:11, d:'固定'},
    {n:'杂费', u:48.88, d:'固定'},
    {n:'翻译费', u:97.50, d:'固定'},
    {n:'护照&身份证', u:668.57, d:'固定'}
  ];
  var total=0;
  var html='<div class="ft-wrap"><table class="ft"><tr><th>费用项目</th><th>公式</th><th>美元</th><th>人民币(万)</th></tr>';
  html+='<tr><td>🏠 房产购买总额</td><td>输入值</td><td class="r">$'+P.toLocaleString()+'</td><td class="r rmb">¥'+(P*USD/10000).toFixed(2)+'万</td></tr>';
  for(var i=0;i<fees.length;i++){
    var f=fees[i]; total+=f.u;
    html+='<tr><td>'+(i+1)+'. '+f.n+'</td><td class="mu">'+f.d+'</td><td class="r">$'+f.u.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r rmb">¥'+(f.u*USD/10000).toFixed(2)+'万</td></tr>';
  }

  html+='<tr class="gr"><td>🏠 总投资(含房价)</td><td>房价+成本</td><td class="r">$'+T.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r rmb">¥'+(T*USD/10000).toFixed(2)+'万</td></tr>';
  html+='</table></div><p class="mu" style="margin-top:8px">📌 汇率1USD=¥7.20 | 四口之家(主申+配偶+2子女) | 不含持有成本(年房产税/保险/物业)</p>';
  document.getElementById('cr').innerHTML=html;
  var w=document.getElementById('cw');
  if(P<400000){w.innerHTML='⚠️ 房价低于$400,000，不满足入籍最低门槛！';w.style.background='#fee2e2';w.style.color='#991b1b'}
  else{w.innerHTML='✅ 房价满足入籍门槛(≥$400,000)<br>⚠️ 注意：政府评估价可能低于购买价，务必以官方评估报告为准';w.style.background='#fef3c7';w.style.color='#92400e'}
  var ca=document.getElementById('commAmount'); if(ca) ca.textContent='$'+Math.round(P*0.2).toLocaleString()+' (房价×20%)';
  var cb=document.getElementById('commBatch'); if(cb) cb.textContent='$'+Math.round(P*0.2).toLocaleString();
  // Live-sync section 12.1
  updateSection12_1();
}


function buildDynamicBudgetHTML(P){
  return '<div id="sec12_1_wrapper">'+buildBudgetTable(P)+'</div>';
}

  var fees=[
    {n:'合同公证费', u:P*0.00742, d:'P×0.742%'},
    {n:'房产评估费', u:1250, d:'固定'},

function updateSection12_1(){
  var docEl=document.getElementById('docView');
  if(!docEl) return;
  var P=parseFloat(document.getElementById('pp').value)||450000;
  var wrapper=document.getElementById('sec12_1_wrapper');
  if(wrapper){
    // Already exists, replace its content
    wrapper.outerHTML=buildDynamicBudgetHTML(P);
  } else {
    // First time: find placeholder and replace
    var html=docEl.innerHTML;
    html=html.split('<p>__BUDGET_12_1__</p>').join(buildDynamicBudgetHTML(P));
    docEl.innerHTML=html;
  }
}
function sync12_1(P){ updateSection12_1(); }
function checkPwd(){
  if(document.getElementById('pwd').value==='888888'){
    document.getElementById('commission').classList.add('show');
    document.getElementById('commission').scrollIntoView({behavior:'smooth'});
    var P=parseFloat(document.getElementById('pp').value)||450000;
    var ca=document.getElementById('commAmount'); if(ca) ca.textContent='$'+Math.round(P*0.2).toLocaleString()+' (房价×20%)';
    var cb=document.getElementById('commBatch'); if(cb) cb.textContent='$'+Math.round(P*0.2).toLocaleString();

var md=`# 土耳其购房入籍执行策划案\n\n> 生成日期：${new Date().toLocaleDateString('zh-CN')}  \n> 适用对象：拟通过土耳其购房入籍取得第二身份的家庭/企业主  \n> 文档版本：客户交付版 V1.0 · Issue #${issue} · 方案 ${solution}  \n> 重要声明：本策划案为商业规划与执行框架，不构成法律、税务、投资或移民建议；落地前须由土耳其持牌律师、税务师、房地产评估机构和银行进行最终确认。\n\n> 💡 **使用提示**：页面顶部的智能费用计算器已根据您的房产总价自动生成预算明细，点击上方【下一步】按钮后在方案中查看实时预算联动结果。\n\n---\n\n## 摘要结论\n\n本方案建议客户以"土耳其购房入籍"为主路径：购买不少于40万美元的合规房产，满足法案规定的投资与持有要求后，申请土耳其公民身份。该路径的核心价值：第一，以实物房产作为投资载体，与金融产品相比更具可感知性和价值托底；第二，房产以美元计价，可对冲汇率波动风险；第三，3年锁定期满后可出售退出，收回大部分本金。\n\n本方案的执行重点有五项：第一，房产必须以合规方式购买并登记过户；第二，必须取得官方评估报告（评估价≥$400,000），且评估价可能低于购买价；第三，客户资金来源和跨境付款路径必须可解释、可追踪、可留痕；第四，3年持有期内不得出售或转让（否则丧失入籍资格）；第五，取得土耳其身份后仍需严格管理中国国籍、税务居民和出入境身份边界。\n\n---\n\n## 一、客户家庭基本信息（待补充版）\n\n### 1.1 已知/默认信息\n\n| 项目 | 当前信息 | 状态 |\n|---|---|---|\n| 客户身份 | 中国籍家庭/企业主/高净值客户 | ⚠️ 待确认 |\n| 核心目标 | 取得第二本护照、增强全球流动性、可选作为E-2赴美跳板 | ⚠️ 待确认 |\n| 预算范围 | 房产购买价 ≥USD 400,000 + 税费及三方费用 | ✅ 已知政策门槛 |\n| 家庭成员 | 主申请人、配偶、18岁以下子女可随行 | ⚠️ 待确认家庭结构 |\n| 是否放弃中国国籍 | 默认不主动处理中国国籍问题 | ⚠️ 需强制风险提示 |\n| 是否计划在土耳其居住 | 默认无长期居住计划 | ⚠️ 待确认 |\n| 是否计划赴美 | 若目标含美国E-2，需另设美国公司与商业计划 | ⚠️ 待确认 |\n| 资金来源 | 购房款、税费、律师费、服务费需合规出境 | ❌ 待确认 |\n| 税务身份 | 中国税务居民为默认假设 | ⚠️ 待确认 |\n| 是否有敏感合规问题 | 地下钱庄、未申报境外资产、资金来源瑕疵等 | ❌ 待确认 |\n\n### 1.2 待解决问题分级\n\n| 编号 | 问题 | 严重度 | 说明 |\n|---|---|---|---|\n| Q1 | 土耳其身份目标是否清晰 | P1 | 土耳其适合"功能性护照/E-2跳板/华侨生可能性讨论"，不适合作为高福利长期居住国。 |\n| Q2 | 资金出境路径是否合法 | P0 | ≥USD 400,000资金出境必须合规，严禁地下钱庄或虚假贸易。 |\n| Q3 | 中国国籍冲突风险 | P0 | 中国不承认双重国籍；第三国护照严禁用于中国出入境。 |\n| Q4 | 房产投资真实性与退出风险 | P1 | 房产需评估、过户、持有3年；评估价可能低于购买价；退出价格和流动性存在不确定性。 |\n| Q5 | 是否将土耳其作为E-2跳板 | P1 | E-2不是绿卡，需真实美国商业投资和运营。 |\n| Q6 | 家庭成员年龄 | P1 | 18岁以下子女可随行；成年子女通常不能随主申请人同步入籍。 |\n| Q7 | 税务居民风险 | P2 | 土耳其通常以183天居住触发税务居民；若不长期居住，税务影响相对可控。 |\n\n### 1.3 根本判断\n\n**表面问题**：客户想办一个土耳其护照。  \n**真实问题**：客户需要一个以实物房产为载体、成本可控、周期较短、可退出、能增强全球流动性并可能衔接美国E-2的功能性身份工具，但必须在中国国籍、资金出境、房产评估与退出、税务居民风险之间做边界管理。\n\n---\n\n## 二、核心策略\n\n### 2.1 三分离定位\n\n| 维度 | 土耳其方案中的定位 | 判断 |\n|---|---|---|\n| 事业国 | 通常仍为中国，除非客户在土耳其/美国有实质业务 | 不建议为拿身份虚构土耳其经营 |\n| 居住国 | 中国 + 可选土耳其短期停留/美国E-2阶段性居住 | 土耳其不作为主要生活地 |\n| 福利国 | 土耳其护照本身不是强福利工具 | 不以福利为核心卖点 |\n| 管钱地 | 香港/新加坡/迪拜等更适合 | 土耳其不作为首选资产管理中心 |\n| 功能性身份 | 土耳其护照 + E-2条约国属性 | 这是核心价值 |\n\n### 2.2 推荐核心路线\n\n**推荐方案A：土耳其40万美元购房入籍 + 3年持有 + 后续视需要衔接美国E-2。**\n\n理由：\n1. **门槛清晰**：购买不少于USD 400,000的合规房产，至少持有3年。\n2. **实物资产**：房产以美元计价，有实物托底，与纯金融产品相比更直观、可感知。\n3. **美元保值**：与存款入籍（里拉贬值风险）和基金入籍（产品风险）相比，房产以美元计价，天然对冲里拉汇率风险。\n4. **周期可控**：通常6-8个月完成审批。\n5. **可退出**：3年持有期满后可出售房产，收回大部分投资本金。\n6. **E-2跳板价值**：土耳其为美国E-2条约国，取得土国籍后可在满足条件时申请E-2。\n7. **不要求长期居住**：适合仍以中国为事业国、居住国的企业主家庭。\n\n### 2.3 三路径对比分析\n\n| 路径 | 投资门槛 | 资产特征 | 持有期 | 美元计价 | 退出机制 | 适用场景 |\n|---|---|---|---|---|---|---|\n| 购房入籍（推荐） | ≥USD 400,000 | 实物房产 | 3年 | ✅ 美元计价 | 出售房产 | 偏好实物资产、关注美元保值 |\n| 基金入籍 | ≥USD 500,000 | 基金份额 | 3年 | ✅ 美元计价 | 赎回基金 | 偏好标准化金融产品 |\n| 存款入籍 | ≥USD 500,000 | 里拉存款 | 3年 | ❌ 里拉风险 | 取出存款 | 追求流程最简单（不推荐） |\n\n---\n\n## 三、合规清理详细方案\n\n### 3.1 资金来源合规\n\n购房入籍不是"买套房就完事"，核心合规点贯穿选房、评估、过户、付款全过程。\n\n| 环节 | 合规要求 | 风险点 | 执行动作 |\n|---|---|---|---|\n| 资金来源 | 能解释购房资金来源 | 现金收入、代持、地下钱庄 | 准备收入证明、纳税记录、企业分红/借款文件 |\n| 资金出境 | 从合规账户支付至土耳其卖方/开发商 | 私下换汇、地下钱庄 | 优先评估ODI、家庭合规换汇、境外已有资产路径 |\n| 银行流水 | 需保留银行转账凭证 | 现金/第三方代付 | 付款全程银行可追踪 |\n| 房产评估 | 土耳其官方评估机构出具评估报告 | 评估价低于购买价导致不达标 | 选房时预留安全边际，确保评估价≥$400,000 |\n| 产权过户 | 完成不动产登记（TAPU） | 产权瑕疵、开发商违约 | 由律师核查产权清晰度和开发商资质 |\n| 外汇登记 | 土耳其央行要求外币兑换为里拉后再购房 | 未按规定操作 | 严格按律师指引完成换汇和交易流程 |\n| 持有锁定 | 3年内不得出售/转让/解除登记限制 | 中途退出导致身份失效 | 事前确认锁定期并在TAPU上登记限制 |\n\n### 3.2 中国国籍边界\n\n红线：**土耳其护照仅限境外金融、税务、签证、身份规划用途，严禁用于中国出入境。**\n\n执行要求：\n- 中国出入境继续使用中国护照。\n- 不在中国境内主动展示或使用土耳其护照作为身份证明。\n- 不用土耳其护照申请中国签证后"外籍身份回国"。\n- 不制造"中国护照+土耳其护照交叉使用"记录。\n\n### 3.3 反洗钱与银行审查\n\n土耳其银行、房产交易会进行严格反洗钱审查。客户需提前准备：\n- 主申请人护照、身份证、户口本、婚姻证明。\n- 无犯罪记录。\n- 收入证明、完税证明、企业营业执照、审计报表。\n- 购房资金流水及换汇/出境路径说明。\n- 如为公司分红/股东借款，准备董事会决议、分红决议、借款协议。\n\n---\n\n## 四、境外资金归集与投资架构\n\n### 4.1 推荐资金路径\n\n| 路径 | 适用客户 | 优点 | 缺点 |\n|---|---|---|---|\n| 家庭合规换汇 | 资金量不大、时间充裕 | 成本低、风险低 | 年度额度有限，不适合一次性大额 |\n| 境外已有资产支付 | 已有香港/新加坡/美元资产 | 付款效率高 | 需解释历史来源 |\n| ODI商业投资路径 | 客户有企业、确有境外业务 | 合规性强，可服务后续架构 | 周期长，材料复杂 |\n| 境外分红/股东借款 | 已有境外公司或家族架构 | 可解释资金用途 | 需税务和转让定价配合 |\n| 地下钱庄 | 不建议 | 表面快 | P0红区，严禁使用 |\n\n### 4.2 资金预算框架\n\n📐 请使用页面顶部计算器，点击下一步后自动计算预算\n\n| 项目 | 预算口径 | 说明 |\n|---|---:|---|\n| 房产购买价 | ≥USD 400,000 | 购房入籍主路径，持有3年 |\n| 交易成本 | 约P×3.742% + $1,250 | 含公证、评估、交易税、产权限制、水电气开通 |\n| 入籍成本 | 约$11,606（四口之家） | 含律师费、POA、公证认证、翻译、保险、官方申请费等 |\n| 国内公证认证 | 约RMB 20,000 | 预估，以票据为准 |\n| 服务费 | 待内部报价 | 参考合同/报价表核算 |\n| 考察行程 | 可选 | 实地看房考察 |\n| 后续E-2 | 另行预算 | 美国公司、商业计划、运营成本另计 |\n\n> 📐 **精确预算请使用页面顶部的智能费用计算器**，输入房产总价即可自动生成所有费用明细。\n\n---\n\n## 五、选房指南\n\n### 5.1 房产选择核心原则\n\n| 原则 | 说明 |\n|---|---|\n| 区位优先 | 优先伊斯坦布尔（欧洲区）、安卡拉、伊兹密尔、安塔利亚等主要城市核心地段，流动性更强。 |\n| 开发商资质 | 核查开发商资质、过往项目交付记录、在土耳其工商登记信息。 |\n| 评估价安全边际 | 政府评估价通常低于市场购买价5-15%，选房时需预留安全边际（如购买价$450,000+以确保评估价≥$400,000）。 |\n| 产权清晰 | 通过律师查明房产有无抵押、查封、产权纠纷、共有权争议。 |\n| 合规证明 | 房产需取得居住许可（İskan/ occupancy permit），新建房产通常需要。 |\n| 回购承诺审慎 | 如开发商承诺3年后回购，必须写入正式合同并评估开发商履约能力，不依赖口头承诺。 |\n| 不追求高收益 | 本项目首要目标是身份，不是房产投资回报最大化。 |\n| 美元计价 | 优先选择以美元定价和交易的房产项目，避免里拉计价带来的隐性汇率风险。 |\n\n### 5.2 可选房源类型\n\n| 类型 | 优点 | 缺点 | 适合客户 |\n|---|---|---|---|\n| 新建公寓（CBD/核心区） | 品质可控、开发商可查、社区配套完善 | 价格较高 | 预算充足、偏好省心 |\n| 二手房（成熟社区） | 价格可能更优、配套成熟 | 质量需现场检验、产权历史需详查 | 有实地看房条件 |\n| 酒店式公寓/服务式住宅 | 后期出租管理方便 | 单价偏高、部分项目存在开发商绑定 | 考虑后期出租 |\n| 别墅（城郊/沿海） | 居住空间大、环境好 | 流动性较差、维护成本高 | 有自住或度假需求 |\n\n### 5.3 评估价风险与应对\n\n| 风险 | 说明 | 应对 |\n|---|---|---|\n| 评估价低于购买价 | 土耳其官方评估值通常比市场价低5-15%，极端情况下差距更大 | ① 购买价不低于$450,000-$480,000留安全边际；② 与开发商约定若评估价不达标可退款或换房；③ 选房前获取开发商近期同项目评估报告参考 |\n| 评估机构选择 | 不同评估机构对同一房产出具评估值可能有差异 | 由律师选择移民局认可的评估机构，不依赖卖方推荐的单一机构 |\n| 评估有效期 | 评估报告有时间窗口，需在有效期内递交入籍材料 | 协调评估、付款、过户、递交的时间衔接 |\n\n### 5.4 不建议做法\n\n- 不建议只听销售说"评估价没问题"，不自己核查。\n- 不建议选购偏远、流动性极差的房产（3年后难以出售）。\n- 不建议忽视开发商资质和过往项目交付记录。\n- 不建议将"包回购"承诺作为唯一安全网（需合同保障+履约能力评估）。\n- 不建议在未取得独立律师法律意见前支付定金或全款。\n- 不建议用不合规资金路径完成房款支付。\n\n---\n\n## 六、财富架构搭建方案\n\n土耳其护照本身不等于财富架构。建议把土耳其作为身份工具，资产管理仍放在更成熟的金融中心。\n\n\n\n### 6.1 推荐架构\n\n### 6.2 不建议架构\n\n- 不建议将全部境外资产集中在土耳其。\n- 不建议用土耳其公司承接中国主营业务利润。\n- 不建议为了E-2虚构美国业务。\n- 不建议以土耳其身份进行中国境内身份切换。\n\n---\n\n## 七、税务分析\n\n### 7.1 土耳其房产相关税务\n\n| 税种 | 税率/金额 | 说明 |\n|---|---|---|\n| 房产交易税（Title Deed Fee） | 买卖双方各2%（共4%） | 购房时一次性缴纳 |\n| 增值税（VAT/KDV） | 通常1%-18%，取决于房产类型 | 外国购买者首次购买新房可能享受VAT豁免，需确认豁免条件 |\n| 年度房产税 | 房产价值的0.1%-0.6%，通常约0.02% | 每年缴纳 |\n| 地震保险（DASK） | 约$7.40/年起 | 强制险 |\n| 资本利得税 | 持有5年内出售需缴 | 3年锁定后出售：若持有满5年免征；3-5年间按增值部分阶梯税率 |\n| 租金收入税 | 15%-40%阶梯税率 | 若出租房产需申报 |\n\n### 7.2 土耳其税务居民风险\n\n| 情形 | 税务判断 |\n|---|---|\n| 仅持有房产、不长期居住 | 通常不应因护照本身自动成为土耳其税务居民，但需律师/税务师确认。 |\n| 每年长期在土耳其居住 | 需评估183天规则和全球收入申报义务。 |\n| 出租土耳其房产 | 租金收入需在土耳其申报缴税。 |\n| 出售土耳其房产 | 持有3-5年间出售可能产生资本利得税；持有满5年出售通常免征。 |\n| 未来E-2赴美 | E-2本人可能因美国停留天数触发美国税务居民规则，需另行设计。 |\n| 中国仍为主要居住和事业地 | 中国税务居民身份通常仍持续。 |\n\n### 7.3 VAT豁免注意事项\n\n外国人在土耳其首次购买新房，满足特定条件（如以外币支付、不出租、不转售一定期限等）可申请VAT豁免。但豁免条件包含：\n\n- 购买者此前未在土耳其拥有房产\n- 以外币支付全部房款\n- 购买后至少1年内不得出租或出售（此要求低于入籍3年锁定）\n- 豁免申请需在购房时一并办理，后期难以补办\n\n⚠️ **VAT豁免不是自动的**，需由律师在交易时确认资格并办理，否则可能产生数万美元额外税费。\n\n---\n\n## 八、资金跨境合规方案\n\n### 8.1 推荐执行路径\n\n| 阶段 | 动作 | 周期 |\n|---|---|---|\n| 第1阶段 | 客户资产和资金来源体检 | 1周 |\n| 第2阶段 | 确认资金出境资料：家庭换汇/境外存量/ODI/分红 | 1-4周 |\n| 第3阶段 | 开立或确认境外付款账户 | 1-3周 |\n| 第4阶段 | 土耳其律师确认收款账户（卖方/开发商账户） | 1周 |\n| 第5阶段 | 银行转账支付购房款（外币换汇为里拉后完成购房）并留存凭证 | 按合同节点 |\n| 第6阶段 | 建立资金档案包，供入籍和后续银行/E-2使用 | 全程 |\n\n### 8.2 土耳其购房外汇操作要点\n\n| 要点 | 规则 | 执行 |\n|---|---|---|\n| 外币购房 | 外国人在土耳其购房可使用美元/欧元支付 | 以银行SWIFT转账为凭证 |\n| 强制换汇 | 根据土耳其央行规定，外国人的外币购房款需先换为里拉再支付 | 银行自动完成，需保留换汇水单 |\n| 汇率时点 | 选择汇率相对有利时点操作 | 可分批、分时操作，避免单一时点风险 |\n| 银行凭证 | 所有付款需银行出具正式凭证 | 律师用于申请材料 |\n\n### 8.3 严禁路径\n\n- 地下钱庄。\n- 现金搬运。\n- 虚假贸易。\n- 第三方代付且无合理解释。\n- 多人拆分汇款后无法解释最终受益人。\n\n---\n\n## 九、身份路径规划\n\n### 9.1 土耳其购房入籍主路径\n\n| 维度 | 内容 |\n|---|---|\n| 路径 | 购买土耳其合规房产申请入籍 |\n| 投资金额 | ≥USD 400,000（以官方评估报告为准） |\n| 持有期 | 3年 |\n| 审批周期 | 通常6-8个月，实际以律师/政府进度为准 |\n| 居住要求 | 无长期居住要求 |\n| 随行成员 | 配偶 + 18岁以下子女 |\n| 双重国籍 | 土耳其允许，但中国不承认双重国籍 |\n| 主要价值 | 功能性护照、E-2条约国身份、实物资产托底 |\n| 退出机制 | 3年后可出售房产（注意5年内出售可能产生资本利得税） |\n| 核心优势 | 美元计价实物资产 → 对冲汇率风险 |\n\n### 9.2 购房入籍流程（从签约到获批）\n\n| 步骤 | 动作 | 周期 |\n|---|---|---|\n| 1 | 选房、价格谈判、律师介入 | 1-3周 |\n| 2 | 律师核查产权、评估机构预评估 | 1-2周 |\n| 3 | 签署购房合同（含评估价不达标退款条款） | 1周 |\n| 4 | 办理外汇换汇、支付购房款 | 1-2周 |\n| 5 | 取得官方评估报告 | 1周 |\n| 6 | 完成产权过户、取得TAPU（地契） | 1-2周 |\n| 7 | 在TAPU上登记"3年不得出售"限制 | 同步 |\n| 8 | 申请短期居留许可 | 1-2月 |\n| 9 | 递交入籍申请 | 1月 |\n| 10 | 政府审批 | 3-6月 |\n| 11 | 获批，领取护照/身份证 | — |\n\n### 9.3 备选路径对比\n\n| 路径 | 门槛 | 适用场景 | 资产特征 | 备注 |\n|---|---:|---|---|\n| 购房入籍 | USD 400,000 | 偏好实物资产、美元计价 | 实物房产 | 推荐本方案主路径 |\n| 房地产投资基金 | USD 500,000 | 偏好标准化金融产品 | 基金份额 | 备选路径 |\n| 银行存款 | USD 500,000 | 追求流程最简单 | 里拉存款 | 汇率风险极高 |\n| 创造就业 | 50个就业 | 真正在土耳其经营 | 商业经营 | 不适合普通家庭 |\n\n### 9.4 E-2衔接逻辑\n\n土耳其公民可具备美国E-2申请资格，但E-2不是自动获得：\n\n| 条件 | 要求 |\n|---|---|\n| 国籍 | 申请人需为E-2条约国公民，如土耳其 |\n| 投资 | 在美国真实、活跃、非边缘业务中投入实质资金 |\n| 控制 | 申请人需拥有并控制美国企业 |\n| 商业计划 | 需说明业务真实运营、收入、雇佣、增长计划 |\n| 居留属性 | E-2为非移民签证，不是绿卡 |\n| 税务 | 美国停留天数和业务利润需另行税务规划 |\n| 重要限制 | 通过投资入籍取得土耳其国籍者，可能需要满足在土连续居住/住所满3年方可申请E签证（Public Law 117-263） |\n\n---\n\n## 十、教育规划\n\n土耳其身份在教育上有三种可能用途，需按客户子女年龄和目标判断。\n\n| 教育用途 | 价值 | 风险/限制 |\n|---|---|---|\n| 海外申请身份多元化 | 子女拥有第二国籍，申请某些国家学校或签证更灵活 | 具体招生规则逐校确认 |\n| 华侨生/外籍生路径讨论 | 土耳其护照可能被客户作为教育规划工具考虑 | 中国相关考试/入学资格政策严格，不能简单等同"有外国护照即可" |\n| 美国E-2随行教育 | E-2配偶/子女可随行在美生活学习 | E-2不是绿卡，长期教育稳定性不如绿卡 |\n\n建议：如果客户核心是子女教育，应将土耳其与香港、新加坡、美国、葡萄牙等路径对比，而不是单独以土耳其做教育终局。\n\n---\n\n## 十一、福利居住国规划\n\n土耳其不建议作为"福利国"核心方案。\n\n| 维度 | 土耳其表现 | 判断 |\n|---|---|---|\n| 教育 | 有国际学校，但非全球顶级教育目的地 | 辅助 |\n| 医疗 | 城市医疗可用，但不作为高福利医疗国 | 辅助 |\n| 养老 | 成本相对低，但语言和生活适应是问题 | 谨慎 |\n| 生育福利 | 非核心卖点 | 不推荐作为卖点 |\n| 综合福利 | 不如欧洲高福利国家 | 不作为福利国 |\n\n推荐定位：**土耳其 = 功能性护照 + E-2跳板 + 可退出美元计价房产；福利国另选。**\n\n---\n\n## 十二、预算明细汇总\n\n> 💡 以下为参考预算，精确费用请使用页面顶部**智能费用计算器**（输入房产总价即可自动生成）。\n\n### 12.1 实时预算（与计算器联动）\n\n__BUDGET_12_1__\n\n### 12.2 费用合计公式\n\n以下为实时联动公式，数字与页面顶部计算器同步更新：\n\n| 类别 | 实时公式 |\n|---|---|\n| 交易成本（与房价联动） | P × 3.742% + USD 1,250 |\n| 入籍成本（四口之家固定） | USD 11,605.95 |\n| 成本费用合计（不含房价） | P × 3.742% + USD 12,855.95 |\n| 总投资（含房价） | P + 成本费用合计 |\n\n> 📐 以上公式与页面顶部智能费用计算器**实时联动**，修改房价后所有数字自动更新。\n\n### 12.3 房产持有成本（每年，不含入籍费用）\n\n| 项目 | 金额 | 说明 |\n|---|---|---|\n| 年度房产税 | P × 0.02%（约$90/年） | 3年合计约$270 |\n| 地震保险DASK | $7.40/年 | 3年合计约$22.20 |\n| 物业费 | $50-150/月 | 取决于房产类型 |\n\n### 12.4 材料清单\n\n| 申请人 | 文件类型 | 公证/认证要求 | 材料 | 备注 |\n|---|---|---|---|---|\n| 主申请人 | 照片 | 无 | 近6个月白底电子版，50mm×60mm | 不戴饰物/眼镜，不露齿，额头无遮挡 |\n| 主申请人 | 护照 | 无 | 有效期6个月以上护照首页扫描件 | 1:1扫描 |\n| 主申请人 | 出生公证及双认证/认证 | 出生，中英文 | 申请人及父母身份证、户口本、出生证明 | 出生证明可到户籍所在地派出所开具 |\n| 主申请人 | 婚姻状态公证及双认证/认证 | 结婚/离婚/未婚，中英文 | 身份证、户口本、结婚证/离婚证/未婚证明 | 根据婚姻状况提供 |\n| 配偶 | 照片 | 无 | 近6个月白底电子版，50mm×60mm | 同主申请人照片要求 |\n| 配偶 | 护照 | 无 | 有效期6个月以上护照首页扫描件 | 1:1扫描 |\n| 配偶 | 出生公证及双认证/认证 | 出生，中英文 | 申请人及父母身份证、户口本、出生证明 | 随行配偶需提供 |\n| 子女 | 照片 | 无 | 近6个月白底电子版，50mm×60mm | 适用于18岁以下随行子女 |\n| 子女 | 护照 | 无 | 有效期6个月以上护照首页扫描件 | 1:1扫描 |\n| 子女 | 出生公证及双认证/认证 | 出生，中英文 | 子女及父母身份证/户口本、父母结婚证、出生医学证明 | 证明亲子关系 |\n| 特殊情况 | 同意未成年子女跟随公证 | 同意书，中英文 | 子女及父母身份证、户口本、婚姻/离婚材料、同意声明 | 离婚或仅一方随行时使用 |\n| 特殊情况 | 监护权证明公证 | 监护人证明，中英文 | 判决书/离婚协议/监护权文件 | 如同意书已包含监护权信息可免 |\n| 特殊情况 | 曾用名公证 | 曾用名，中英文 | 身份证、户口本扫描件 | 材料姓名不一致时使用 |\n\n### 12.5 三方材料清单\n\n| 责任方 | 材料/文件 | 用途 | 输出/留存 |\n|---|---|---|---|\n| 客户 | 护照、照片、身份证、户口本、婚姻证明、出生证明、无犯罪等 | 身份与家庭关系证明 | 客户基础材料包 |\n| 客户 | 资金来源证明、银行流水、付款凭证 | 证明购房资金来源和付款路径 | 资金合规档案 |\n| 客户 | POA授权文件 | 授权律师办理购房、过户、居留和入籍手续 | POA原件/认证件 |\n| 顾问/移民公司 | 服务合同、报价单 | 确认服务范围、费用、节点 | 签约文件包 |\n| 顾问/移民公司 | 材料初审表、进度表、客户沟通记录 | 项目管理 | 内部项目档案 |\n| 土耳其律师 | 最新法案确认、申请表、递交文件清单 | 法律递交依据 | 律师确认版文件清单 |\n| 土耳其律师 | 产权核查报告、购房合同审核 | 房产合规确认 | 律师法律意见 |\n| 评估机构 | 官方房产评估报告 | 入籍核心依据（评估价≥$400,000） | 评估报告原件 |\n| 开发商/卖方 | 产权证、税务登记、合规证明 | 房产背景核实 | 房产文件包 |\n| 土地登记局 | TAPU（地契） | 产权登记证明 | TAPU原件+译本 |\n| 公证/认证机构 | 公证书、认证/海牙认证文件 | 境外政府认可材料 | 公认证文件包 |\n| 保险公司 | 移民保险、地震保险DASK | 居留和入籍申请 | 保险凭证 |\n\n---\n\n## 十三、执行时间轴\n\n### 13.1 标准执行路径（购房版）\n\n| 时间 | 动作 | 责任方 | 交付物 |\n|---|---|---|---|\n| 第1周 | 客户信息收集、家庭成员确认、资金来源初审 | 顾问+客户 | 客户信息表、风险清单 |\n| 第1-2周 | 土耳其律师/房产顾问提供可选房源、确认材料清单 | 顾问+律师 | 房源清单、文件清单、费用表 |\n| 第2-3周 | 选房、价格谈判、律师介入核查产权 | 客户+律师 | 选定房产、律师核查报告 |\n| 第2-4周 | 准备公证认证材料、无犯罪、婚姻/出生证明 | 客户+律师 | 材料包 |\n| 第3-5周 | 签署购房合同、支付定金/全款 | 客户+律师+开发商 | 购房合同、付款凭证 |\n| 第4-6周 | 办理换汇、完成付款、取得官方评估报告 | 客户+银行+评估机构 | 评估报告、换汇水单 |\n| 第5-7周 | 完成产权过户、取得TAPU并登记限制 | 律师+土地局 | TAPU（地契） |\n| 第2-3月 | 申请投资者居留许可 | 律师 | 居留许可 |\n| 第3-6月 | 递交入籍申请、等待审批 | 律师 | 入籍申请回执 |\n| 第6-8月 | 获批、领取土耳其护照 | 客户+律师 | 护照/身份证明 |\n| 第8月后 | 若需E-2，启动美国商业计划和公司设立 | 美国律师+客户 | E-2商业计划与申请包 |\n| 持有满3年 | 评估是否出售房产、关注资本利得税 | 客户+顾问+律师 | 退出/续持方案 |\n\n### 13.2 详细办理流程图\n\n| 步骤 | 动作 | 责任方 | 输出 |\n|---|---|---|---|\n| 1 | 确认选择购房路径，了解门槛和费用 | 顾问+客户 | 方案确认 |\n| 2 | 律师核查房产产权和开发商合规性 | 律师 | 产权核查报告 |\n| 3 | 客户准备主副申请人材料 | 客户 | 身份+婚姻+出生材料 |\n| 4 | 国内公证/认证/翻译 | 客户+公证机构 | 可递交文件包 |\n| 5 | 签署购房合同（含评估价不达标退款条款） | 客户+律师+开发商 | 购房合同 |\n| 6 | 外汇换汇+银行转账支付房款 | 客户+银行 | 转账凭证+换汇水单 |\n| 7 | 取得官方评估报告（确认评估价≥$400,000） | 评估机构 | 评估报告 |\n| 8 | 完成产权过户、取得TAPU+登记3年限制 | 律师+土地局 | TAPU地契 |\n| 9 | 递交居留许可申请 | 律师 | 居留申请回执 |\n| 10 | 录指纹、补件 | 客户+律师 | 录指纹记录/补件回执 |\n| 11 | 递交入籍申请 | 律师 | 入籍申请回执 |\n| 12 | 政府审批 | 移民局/相关部门 | 审批结果 |\n| 13 | 获批、领取土耳其护照/身份证明 | 客户+律师 | 护照、身份证明 |\n| 14 | 建立3年持有到期提醒+退出方案 | 顾问 | 退出管理日程表 |\n\n\`\`\`text\n客户确认购房路径\n      ↓\n律师核查房源/产权合规\n      ↓\n准备家庭成员材料 + 公证认证\n      ↓\n签署购房合同（含评估价不达标退款条款）\n      ↓\n外汇换汇 → 支付购房款\n      ↓\n取得官方评估报告（≥$400,000）\n      ↓\n完成TAPU过户 + 登记不得出售限制\n      ↓\n律师递交居留许可申请\n      ↓\n录指纹/补件\n      ↓\n律师递交入籍申请\n      ↓\n政府审批\n      ↓\n身份获批，领取土耳其护照\n      ↓\n建立3年持有与退出管理表\n\`\`\`\n\n### 13.3 本周立即行动清单\n\n| 编号 | 动作 | 目的 |\n|---|---|---|\n| 1 | 确认客户家庭成员年龄和是否随行 | 判断是否全部可同步入籍 |\n| 2 | 确认客户核心目标：护照/E-2/教育/资产 | 避免路径错配 |\n| 3 | 确认资金来源和出境路径 | 排除P0合规风险 |\n| 4 | 了解客户房产偏好（城市/类型/预算） | 筛选适配房源 |\n| 5 | 联系土耳其律师获取最新法案确认和可选房源 | 官方落地确认 |\n| 6 | 明确是否安排实地考察 | 决定是否需要考察行程 |\n| 7 | 使用计算器确认预算区间 | 形成正式报价和费用表 |\n\n---\n\n## 十四、重要风险声明\n\n### 14.1 国籍风险\n\n**中国不承认双重国籍。** 客户取得土耳其国籍后，如在中国出入境或境内身份使用中发生交叉使用，可能触发国籍冲突和行政风险。土耳其护照只能作为境外功能性身份工具使用。\n\n### 14.2 评估价风险（购房路径特有 ⚠️ P1）\n\n**土耳其官方房产评估价通常低于市场购买价5%-15%。** 如果客户以$400,000购买房产，而官方评估报告仅出具$360,000，则不能满足≥$400,000的入籍门槛。常见真实案例：同一房源购买价$420,000，评估价仅$380,000——客户面临额外补款或换房的困境。\n\n执行要求：① 购房预算预留10-20%安全边际（建议购买价≥$450,000-$480,000）；② 购房合同必须包含"评估价不达标可退款或换房"的条款；③ 由律师指定独立评估机构，不依赖卖方单方推荐。\n\n### 14.3 市场波动与退出风险（购房路径特有 ⚠️ P1）\n\n**3年锁定期满后出售房产时，市场行情无法预测。** 影响因素包括：土耳其宏观经济（通胀、利率、汇率）、房地产供需变化、区域发展规划调整、地缘政治事件等。可能出现以下情形：\n\n- 房价上涨：出售时获利，但需关注持有不足5年可能产生的资本利得税。\n- 房价平稳：按接近原价出售，损失主要为交易成本。\n- 房价下跌：出售时本金亏损。\n\n⚠️ **极端情形警示**：若3年后里拉大幅贬值（如从当前35 TRY/USD贬至70+ TRY/USD），即使美元计价的房价数字未变，实际市场的流动性和买家购买力将受到严重影响，可能导致有价无市。\n\n### 14.4 VAT豁免风险（购房路径特有）\n\n**新房购买可能享受VAT豁免，但豁免不是自动的、也不是无条件的。** 若未在购房交易时一并办理豁免申请，后期难以补办。以下情况可能导致豁免失效：\n\n- 卖方/开发商未配合提供豁免所需文件\n- 购买者此前在土耳其已有房产（部分情况下可能影响豁免资格）\n- 以外币支付、不出租、1年内不转售等条件未能满足\n- 豁免申请材料不完整或填写有误\n\n⚠️ **必须由土耳其律师在签约前确认VAT豁免资格和办理流程**，否则可能产生数万美元额外税费。\n\n### 14.5 产权风险\n\n土耳其房产可能存在以下产权风险：\n- 开发商与土地所有者之间纠纷导致无法过户\n- 房产存在历史抵押、查封或共有权争议\n- 新建房产未取得居住许可（İskan），影响产权登记\n- 开发商未能按期交付或交付质量不符\n- "包回购"承诺仅为口头承诺，无合同约束力\n\n**必须由独立律师在付款前完成产权核查。**\n\n### 14.6 政策风险\n\n土耳其投资入籍政策曾多次调整：2018年购房门槛由USD 1,000,000降至USD 250,000；2022年又提高至USD 400,000。未来仍可能提高门槛、收紧审查、调整材料要求甚至废除该路径。正式签约前必须由土耳其律师核验最新法案。\n\n### 14.7 E-2风险\n\n土耳其护照只是E-2资格前提之一，不代表自动获得美国E-2签证。E-2要求真实美国投资、真实经营、非边缘企业、商业计划和持续运营。E-2不是绿卡，也不直接通向美国永久居民身份。通过投资入籍取得土耳其国籍者，可能需要满足在土连续居住/住所满3年方可申请E签证。\n\n### 14.8 税务风险\n\n取得土耳其护照不等于改变中国税务居民身份，也不等于避税。出售土耳其房产可能产生资本利得税（持有3-5年间出售适用阶梯税率，满5年出售通常免征）。若客户未来长期居住土耳其或美国，可能触发当地税务居民规则和全球收入申报义务。\n\n### 14.9 持有成本风险\n\n即使客户不居住在土耳其，房产持有成本（年度房产税、地震保险DASK、物业费）仍需持续缴纳。如委托物业管理，还需额外管理费。建议预算中预留每年$1,000-$2,000的持有成本。\n\n### 14.10 资金出境风险\n\n任何地下钱庄、虚假贸易、现金搬运、第三方不明代付都属于重大合规风险。本方案必须以可解释、可追踪、可留痕的资金路径为前提。\n\n---\n\n## 附件：引用法律法规与项目资料来源\n\n### A. 本次方案引用到的法律依据清单\n\n| 法案/规则 | 条款/款项 | 本次用途 | 最新更新时间 | 备注 |\n|---|---|---|---|---|\n| 《土耳其公民法》（Turkish Citizenship Law No. 5901） | 第12条：Exceptional acquisition of Turkish citizenship | 土耳其投资入籍的上位法依据 | 本次核验：2026-06 | 需结合实施条例适用 |\n| 《土耳其公民法实施条例》（Regulation on the Implementation of the Turkish Citizenship Law） | 第20条 | 规定投资入籍具体路径、门槛和确认机关 | 2022-05-13官方公报修订；2022-06-13生效 | 本方案核心执行条款 |\n| 《土耳其公民法实施条例》 | 第20条第2款房地产购买相关项 | 购房入籍：购买不低于USD 400,000房产并持有3年 | 2022-06-13生效 | 本方案直接条款依据 |\n| 《外国人和国际保护法》（Law No. 6458） | 第31条第1款第(j)项 | 投资人短期居留许可依据 | 本次核验：2026-06 | 居留许可与入籍申请衔接 |\n| 土耳其《不动产登记法》（Land Registry Law） | TAPU登记、所有权转移、限制登记相关条款 | 购房过户和"3年不出售"限制登记的法律依据 | 现行有效 | TAPU是入籍申请的核心文件之一 |\n| 土耳其《增值税法》（VAT Law No. 3065） | 外国人首次购房VAT豁免相关条款 | 判断新房购买是否可享受VAT豁免 | 需律师在购房时确认 | 豁免需在交易时一并办理 |\n| 美国《移民与国籍法》（Immigration and Nationality Act, INA） | 101(a)(15)(E) | E-2条约投资人签证法源 | 本次核验：2026-06 | 土耳其护照后续衔接美国E-2的总依据 |\n| 美国国务院《外交事务手册》（9 FAM 402.9） | E-1/E-2 Treaty Trader and Treaty Investor | E-2签证审查标准 | 2026-02-17刷新口径 | E-2不是绿卡，需独立商业计划 |\n| 美国Public Law 117-263相关E签证修订 | 金融投资取得条约国国籍者的3年居住/住所要求 | 影响通过投资入籍取得土国籍后立即申请E签证的可行性 | 2022-12-27生效 | 必须由美国移民律师专项判断 |\n| 《中华人民共和国国籍法》 | 第3条 | 中国不承认中国公民具有双重国籍 | 现行有效 | 土耳其允许双重国籍≠中国承认 |\n| 《中华人民共和国国籍法》 | 第9条 | 自愿加入外国国籍的自动丧失中国国籍 | 现行有效 | 属最高风险条款 |\n| 《中华人民共和国出境入境管理法》 | 相关条款 | 提醒第三国护照不得用于中国出入境切换 | 现行有效 | 出入境证件必须一致 |\n\n### B. 多个法案之间的相互影响\n\n| 组合 | 相互影响 | 需要注意的点 |\n|---|---|---|\n| 土耳其《公民法》+ 实施条例 + 《不动产登记法》 | 《公民法》给投资入籍入口，实施条例给房产门槛，不动产登记法决定过户和限制登记 | 三者必须同时满足；TAPU+评估报告是入籍申请核心文件。 |\n| 实施条例房产条款 + 3年锁定规则 | 购买房产需至少持有3年，且必须在TAPU上登记限制 | 3年内不得出售、转让或解除限制。 |\n| 《外国人和国际保护法》第31条 + 入籍申请 | 投资人通常需先取得短期居留许可，再递交入籍 | 居留材料、保险、无犯罪、录指纹等不能跳过。 |\n| 不动产登记法 + VAT豁免 | 过户登记时需同时确认VAT豁免资格并办理 | VAT豁免不是自动的；错失可能导致数万美元额外税费。 |\n| 土耳其国籍 + 美国E-2 | 土耳其是E-2条约国 | E-2需独立满足美国规则；注意投资入籍后的3年住所要求。 |\n| 美国E-2 + 中国国籍边界 | E-2申请可能使用土耳其国籍，但中国出入境仍受中国国籍法约束 | 不得把土耳其护照用于中国出入境切换。 |\n| 土耳其允许双重国籍 + 中国不承认双重国籍 | 两国国籍制度不一致 | 对客户表达必须使用"境外功能性身份"而非"中国承认双国籍"。 |\n| 土耳其身份 + 中国税务居民 | 获得土耳其护照不自动改变中国税务居民身份 | 全球资产、CRS、CFC、个人所得税仍需独立评估。 |\n\n### C. 法律适用注意事项\n\n1. **条款层级**：以《土耳其公民法》第12条为上位法，以实施条例第20条房产条款为操作依据。\n2. **评估价是门槛红线**：必须以官方评估报告中的评估值为准，而非购买价。\n3. **TAPU是核心文件**：必须在TAPU上明确登记"3年不得出售"的限制。\n4. **锁定期是身份安全阀**：3年内不得擅自出售、转让或解除登记限制。\n5. **VAT豁免需主动办理**：不是自动享有的权利，需在购房交易时一并完成。\n6. **E-2不是自动收益**：土耳其护照只是资格基础之一。\n7. **E-2三年住所要求需专项审查**：投资入籍取得土耳其国籍者，美国律师必须判断是否需要连续居住满3年。\n8. **中国国籍风险不能淡化**：所有客户沟通必须避免承诺"双重国籍安全"。\n9. **出入境身份一致性**：中国出入境应保持中国护照一致。\n10. **税务和身份分开判断**：取得土耳其护照不等于改变税务居民身份。\n11. **最终落地三方确认**：土耳其律师确认法案和递交流程，房产评估机构确认评估价值，税务师确认资金来源与税务后果。\n\n### D. 交付前客户需补充与确认资料\n\n1. 客户完整家庭信息与随行成员名单。\n2. 主申请人及随行成员护照、身份证、户口本、婚姻/出生证明。\n3. 资金来源证明、境内外账户流水与资金出境路径说明。\n4. 土耳其律师出具的产权核查报告。\n5. 官方房产评估报告（确认评估价≥$400,000）。\n6. TAPU地契原件（确认已登记3年不出售限制）。\n7. 购房合同原件（含评估价不达标退款条款）。\n8. VAT豁免确认（如适用新房）。\n9. 如后续衔接美国E-2，需另行提供美国商业计划初稿和美国移民律师意见。\n`;
