function crc32(str){var table=window._crcTable;if(!table){table=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));table[n]=c>>>0;}window._crcTable=table;}var crc=0^(-1);for(var i=0;i<str.length;i++){crc=(crc>>>8)^table[(crc^str.charCodeAt(i))&0xff];}return (crc^(-1))>>>0;}
function u16(n){return String.fromCharCode(n&255,(n>>>8)&255)}function u32(n){return String.fromCharCode(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}
function makeZipBlob(filename,content){var data=unescape(encodeURIComponent(content));var name=unescape(encodeURIComponent(filename));var crc=crc32(data);var local='PK\x03\x04'+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+name+data;var central='PK\x01\x02'+u16(20)+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+u16(0)+u16(0)+u16(0)+u32(0)+u32(0)+name;var end='PK\x05\x06'+u16(0)+u16(0)+u16(1)+u16(1)+u32(central.length)+u32(local.length)+u16(0);var zip=local+central+end;var bytes=new Uint8Array(zip.length);for(var i=0;i<zip.length;i++)bytes[i]=zip.charCodeAt(i)&255;return new Blob([bytes],{type:'application/zip'});}

function q(k){return new URL(location.href).searchParams.get(k)||''}
function toast(t){var x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(function(){x.classList.remove('show')},1600)}
var projectMap={
 'tr-fund-cbi':'土耳其房地产投资基金入籍',

 'tr-realestate-cbi':'土耳其购房入籍',

};
function buildPlan(){
 var issue=q('issue')||'未关联';var solution=q('solution')||'A';var project=q('project')||'tr-fund-cbi';var projectName=projectMap[project]||project;
 document.getElementById('meta').textContent='来源：评估结果 Issue #'+issue+' · 已选方案 '+solution;
 document.getElementById('projectPill').textContent=projectName;
 document.getElementById('summary').innerHTML='本执行策划案按客户交付版模板生成，包含客户信息确认、核心策略、合规清理、资金路径、投资使用建议、财富架构、税务分析、身份路径、教育与福利规划、预算与三方费用、材料清单、办理流程图、风险声明、法律依据和法案相互影响总结。';
 var md="# 土耳其基金投资入籍执行策划案\n\n> 生成日期：2026-06-07  \n> 适用对象：拟通过土耳其基金投资入籍取得第二身份的家庭/企业主  \n> 文档版本：客户交付版 V1.0  \n> 重要声明：本策划案为商业规划与执行框架，不构成法律、税务、投资或移民建议；落地前须由土耳其持牌律师、税务师、房地产评估机构和银行进行最终确认。\n\n---\n\n## 摘要结论\n\n本方案建议客户以“土耳其房地产投资基金入籍”为主路径：通过认购不少于50万美元的合规房地产投资基金份额，满足法案规定的投资与持有要求后，申请土耳其公民身份。该路径的核心价值不在于移居土耳其，而在于取得一个周期较短、路径清晰、可作为全球身份配置工具的第二身份，并在必要时为后续美国E-2签证、国际出行、资产配置和子女教育规划提供更多选择。\n\n本方案的执行重点有三项：第一，投资基金必须满足土耳其投资入籍法案及资本市场委员会监管要求；第二，客户资金来源和跨境付款路径必须可解释、可追踪、可留痕；第三，取得土耳其身份后仍需严格管理中国国籍、税务居民和出入境身份边界，不能将“土耳其允许双重国籍”误解为“中国承认双重国籍”。\n\n## 一、客户家庭基本信息（待补充版）\n\n### 1.1 已知/默认信息\n\n| 项目 | 当前信息 | 状态 |\n|---|---|---|\n| 客户身份 | 中国籍家庭/企业主/高净值客户 | ⚠️ 待确认 |\n| 核心目标 | 取得第二本护照、增强全球流动性、可选作为E-2赴美跳板 | ⚠️ 待确认 |\n| 预算范围 | 至少覆盖土耳其房产投资入籍门槛：USD 400,000 起 | ✅ 已知政策门槛 |\n| 家庭成员 | 主申请人、配偶、18岁以下子女可随行 | ⚠️ 待确认家庭结构 |\n| 是否放弃中国国籍 | 默认不主动处理中国国籍问题 | ⚠️ 需强制风险提示 |\n| 是否计划在土耳其居住 | 默认无长期居住计划 | ⚠️ 待确认 |\n| 是否计划赴美 | 若目标含美国E-2，需另设美国公司与商业计划 | ⚠️ 待确认 |\n| 资金来源 | 购房款、税费、律师费、服务费需合规出境 | ❌ 待确认 |\n| 税务身份 | 中国税务居民为默认假设 | ⚠️ 待确认 |\n| 是否有敏感合规问题 | 地下钱庄、未申报境外资产、资金来源瑕疵等 | ❌ 待确认 |\n\n### 1.2 待解决问题分级\n\n| 编号 | 问题 | 严重度 | 说明 |\n|---|---|---|---|\n| Q1 | 土耳其身份目标是否清晰 | P1 | 土耳其适合“功能性护照/E-2跳板/华侨生可能性讨论”，不适合作为高福利长期居住国。 |\n| Q2 | 资金出境路径是否合法 | P0 | USD 400,000+资金出境必须合规，严禁地下钱庄或虚假贸易。 |\n| Q3 | 中国国籍冲突风险 | P0 | 中国不承认双重国籍；第三国护照严禁用于中国出入境。 |\n| Q4 | 房产投资真实性与退出风险 | P1 | 房产需评估、过户、持有3年；退出价格和流动性存在不确定性。 |\n| Q5 | 是否将土耳其作为E-2跳板 | P1 | E-2不是绿卡，需真实美国商业投资和运营。 |\n| Q6 | 家庭成员年龄 | P1 | 18岁以下子女可随行；成年子女通常不能随主申请人同步入籍。 |\n| Q7 | 税务居民风险 | P2 | 土耳其通常以183天居住触发税务居民；若不长期居住，税务影响相对可控。 |\n\n### 1.3 根本判断\n\n**表面问题**：客户想办一个土耳其护照。  \n**真实问题**：客户需要一个成本可控、周期较短、可退出、能增强全球流动性并可能衔接美国E-2的功能性身份工具，但必须在中国国籍、资金出境、房产投资真实性、税务居民风险之间做边界管理。\n\n---\n\n## 二、核心策略\n\n### 2.1 三分离定位\n\n| 维度 | 土耳其方案中的定位 | 判断 |\n|---|---|---|\n| 事业国 | 通常仍为中国，除非客户在土耳其/美国有实质业务 | 不建议为拿身份虚构土耳其经营 |\n| 居住国 | 中国 + 可选土耳其短期停留/美国E-2阶段性居住 | 土耳其不作为主要生活地 |\n| 福利国 | 土耳其护照本身不是强福利工具 | 不以福利为核心卖点 |\n| 管钱地 | 香港/新加坡/迪拜等更适合 | 土耳其不作为首选资产管理中心 |\n| 功能性身份 | 土耳其护照 + E-2条约国属性 | 这是核心价值 |\n\n### 2.2 推荐核心路线\n\n**推荐方案A：土耳其50万美元房地产投资基金入籍 + 3年锁定 + 后续视需要衔接美国E-2。**\n\n理由：\n1. **门槛清晰**：当前主流路径为认购不少于USD 500,000的土耳其房地产投资基金份额，至少持有3年。\n2. **周期较短**：项目资料显示通常6-8个月；培训FAQ中提到居留许可+护照阶段合计约数月，实际以律师进度为准。\n3. **可退出**：基金锁定期结束后可按基金规则赎回或退出，流动性和估值通常比单一房产更标准化。\n4. **E-2跳板价值**：土耳其为美国E-2条约国，取得土耳其国籍后可在满足美国E-2条件时申请E-2。\n5. **不要求长期居住**：适合仍以中国为事业国、居住国的企业主家庭。\n\n---\n\n## 三、合规清理详细方案\n\n### 3.1 资金来源合规\n\n土耳其项目不是“只要买房就能办”，核心合规点是资金来源和付款路径。\n\n| 环节 | 合规要求 | 风险点 | 执行动作 |\n|---|---|---|---|\n| 资金来源 | 能解释购房资金来源 | 现金收入、代持、地下钱庄 | 准备收入证明、纳税记录、企业分红/借款文件 |\n| 资金出境 | 从合规账户支付至土耳其卖方/项目方 | 私下换汇、地下钱庄 | 优先评估ODI、家庭合规换汇、境外已有资产路径 |\n| 银行流水 | 需保留银行转账凭证 | 现金/第三方代付 | 付款全程银行可追踪 |\n| 基金认购 | 需基金合规文件、基金要素表、认购协议 | 私募假基金、虚假产品 | 核验基金管理人、托管银行、审计机构 |\n| 资金确认 | 资金到基金募集账户/指定托管账户 | 账户错误、非官方收款 | 严格按基金文件与律师指引付款 |\n| 认购锁定 | 需满足最少持有期 | 中途退出导致身份失效 | 事前确认锁定期和退出规则 |\n\n### 3.2 中国国籍边界\n\n红线：**土耳其护照仅限境外金融、税务、签证、身份规划用途，严禁用于中国出入境。**\n\n执行要求：\n- 中国出入境继续使用中国护照。\n- 不在中国境内主动展示或使用土耳其护照作为身份证明。\n- 不用土耳其护照申请中国签证后“外籍身份回国”。\n- 不制造“中国护照+土耳其护照交叉使用”记录。\n\n### 3.3 反洗钱与银行审查\n\n土耳其银行、房产交易、美国E-2后续银行开户都会审查资金来源。客户需提前准备：\n- 主申请人护照、身份证、户口本、婚姻证明。\n- 无犯罪记录。\n- 收入证明、完税证明、企业营业执照、审计报表。\n- 购房资金流水及换汇/出境路径说明。\n- 如为公司分红/股东借款，准备董事会决议、分红决议、借款协议。\n\n---\n\n## 四、境外资金归集与投资架构\n\n### 4.1 推荐资金路径\n\n| 路径 | 适用客户 | 优点 | 缺点 |\n|---|---|---|---|\n| 家庭合规换汇 | 资金量不大、时间充裕 | 成本低、风险低 | 年度额度有限，不适合一次性大额 |\n| 境外已有资产支付 | 已有香港/新加坡/美元资产 | 付款效率高 | 需解释历史来源 |\n| ODI商业投资路径 | 客户有企业、确有境外业务 | 合规性强，可服务后续架构 | 周期长，材料复杂 |\n| 境外分红/股东借款 | 已有境外公司或家族架构 | 可解释资金用途 | 需税务和转让定价配合 |\n| 地下钱庄 | 不建议 | 表面快 | P0红区，严禁使用 |\n\n### 4.2 资金预算框架\n\n| 项目 | 预算口径 | 说明 |\n|---|---:|---|\n| 房产投资额 | ≥USD 500,000 | 购房入籍主路径，持有3年 |\n| 税费/过户/评估 | 待律师核算 | 取决于房产和当地政策 |\n| 律师费 | 待报价 | 建议客户直接聘请土耳其律师 |\n| 服务费 | 待内部报价 | 参考项目项目资料合同/报价表核算 |\n| 翻译公证认证 | 待核算 | 中国文件通常需翻译、公证/认证 |\n| 考察行程 | 可选 | 项目资料已有“四天三晚收费考察行程” |\n| 后续E-2 | 另行预算 | 美国公司、商业计划、运营成本另计 |\n\n---\n\n## 五、投资使用建议\n\n### 5.1 基金选择原则\n\n| 原则 | 说明 |\n|---|---|\n| 基金资质清晰 | 必须核查基金管理人、托管银行、审计机构、法律顾问。 |\n| 法案适配 | 基金要素必须被土耳其投资入籍法案认可。 |\n| 锁定期明确 | 需明确至少3年锁定与退出规则；本次项目资料中的Cornerstone REIF要素表显示锁定期为3.5年，需以签约文件最终确认为准。 |\n| 退出机制明确 | 优先选择有标准化赎回或份额转让机制的产品。 |\n| 不追求高收益 | 本项目首要目标是身份，不是基金收益最大化。 |\n| 避免单一销售话术 | 必须由律师和第三方顾问复核基金文件。 |\n\n### 5.2 基金路径要点\n\n| 维度 | 本方案口径 |\n|---|---|\n| 基金类型 | 房地产投资基金（REIF） |\n| 投资门槛 | USD 500,000或等值货币 |\n| 基金发行费 | USD 50,000（项目资料快速签约表口径） |\n| 律师费 | USD 30,000/家庭（项目资料费用表口径） |\n| 管理费 | 项目资料要素表显示3%/年，需以基金文件确认 |\n| 投资方向 | 成熟商业地产/房地产投资基金 |\n| 退出路径 | 锁定期结束后赎回或按基金规则退出 |\n| 适合客户 | 不想选房、不想承担单一房产交易复杂度、偏好标准化金融产品的客户 |\n\n### 5.3 不建议做法\n\n- 不建议只听销售口径，不看基金募集文件、托管安排和审计安排。\n- 不建议忽视锁定期和退出规则，只看“可回款”表述。\n- 不建议将基金收益作为核心承诺对客户表达。\n- 不建议用不合规资金路径完成基金认购。\n\n\n## 六、财富架构搭建方案\n\n土耳其护照本身不等于财富架构。建议把土耳其作为身份工具，资产管理仍放在更成熟的金融中心。\n\n### 6.1 推荐架构\n\n```text\n中国事业主体/家庭资产\n        ↓ 合规资金路径\n香港/新加坡/迪拜账户或控股平台\n        ↓ 支付购房款/管理境外资产\n土耳其房地产投资基金份额（入籍资产，至少持有3年）\n        ↓ 可选\n美国E-2公司（如客户有赴美经营需求）\n```\n\n### 6.2 不建议架构\n\n- 不建议将全部境外资产集中在土耳其。\n- 不建议用土耳其公司承接中国主营业务利润。\n- 不建议为了E-2虚构美国业务。\n- 不建议以土耳其身份进行中国境内身份切换。\n\n---\n\n## 七、税务分析\n\n### 7.1 土耳其税务居民风险\n\n项目资料口径：土耳其个人所得税为15%-40%累进税；通常住满183天可能触发税务居民，面临全球征税风险。\n\n| 情形 | 税务判断 |\n|---|---|\n| 只投资房产、不长期居住 | 通常不应因护照本身自动成为土耳其税务居民，但需律师/税务师确认。 |\n| 每年长期在土耳其居住 | 需评估183天规则和全球收入申报义务。 |\n| 未来E-2赴美 | E-2本人可能因美国停留天数触发美国税务居民规则，需另行设计。 |\n| 中国仍为主要居住和事业地 | 中国税务居民身份通常仍持续。 |\n\n### 7.2 税务风险边界\n\n- 土耳其护照不是自动避税工具。\n- 房产出售可能产生当地税费或汇兑损益。\n- 如后续进入美国E-2，需提前规划美国实质居住天数、公司利润、个人报税。\n- 若客户已有境外账户，应检查CRS、CFC、个人所得税申报风险。\n\n---\n\n## 八、资金跨境合规方案\n\n### 8.1 推荐执行路径\n\n| 阶段 | 动作 | 周期 |\n|---|---|---|\n| 第1阶段 | 客户资产和资金来源体检 | 1周 |\n| 第2阶段 | 确认资金出境资料：家庭换汇/境外存量/ODI/分红 | 1-4周 |\n| 第3阶段 | 开立或确认境外付款账户 | 1-3周 |\n| 第4阶段 | 土耳其律师确认付款路径和收款账户 | 1周 |\n| 第5阶段 | 银行转账支付购房款并留存凭证 | 按合同节点 |\n| 第6阶段 | 建立资金档案包，供入籍和后续银行/E-2使用 | 全程 |\n\n### 8.2 严禁路径\n\n- 地下钱庄。\n- 现金搬运。\n- 虚假贸易。\n- 第三方代付且无合理解释。\n- 多人拆分汇款后无法解释最终受益人。\n\n---\n\n## 九、身份路径规划\n\n### 9.1 土耳其投资入籍主路径\n\n| 维度 | 内容 |\n|---|---|\n| 路径 | 认购土耳其房地产投资基金份额申请入籍 |\n| 投资金额 | ≥USD 500,000 |\n| 持有期 | 3年 |\n| 审批周期 | 通常6-8个月，实际以律师/政府进度为准 |\n| 居住要求 | 无长期居住要求 |\n| 随行成员 | 配偶 + 18岁以下子女 |\n| 双重国籍 | 土耳其允许，但中国不承认双重国籍 |\n| 主要价值 | 功能性护照、E-2条约国身份、快速取得第二身份 |\n| 退出机制 | 3年后可考虑出售房产 |\n\n### 9.2 备选路径\n\n| 路径 | 门槛 | 适用场景 | 备注 |\n|---|---:|---|---|\n| 房产投资 | USD 400,000 | 传统主流，适合需要实物资产 | 备选路径 |\n| 银行存款 | USD 500,000 | 不想买房、偏好资金型 | 需锁定期和银行配合 |\n| 房地产投资基金 | USD 500,000 | 偏标准化基金产品 | 推荐本方案主路径 |\n| 创造就业 | 50个就业 | 真正在土耳其经营 | 一般不适合普通家庭 |\n\n### 9.3 E-2衔接逻辑\n\n土耳其公民可具备美国E-2申请资格，但E-2不是自动获得：\n\n| 条件 | 要求 |\n|---|---|\n| 国籍 | 申请人需为E-2条约国公民，如土耳其 |\n| 投资 | 在美国真实、活跃、非边缘业务中投入实质资金 |\n| 控制 | 申请人需拥有并控制美国企业 |\n| 商业计划 | 需说明业务真实运营、收入、雇佣、增长计划 |\n| 居留属性 | E-2为非移民签证，不是绿卡 |\n| 税务 | 美国停留天数和业务利润需另行税务规划 |\n\n---\n\n## 十、教育规划\n\n土耳其身份在教育上有三种可能用途，需按客户子女年龄和目标判断。\n\n| 教育用途 | 价值 | 风险/限制 |\n|---|---|---|\n| 海外申请身份多元化 | 子女拥有第二国籍，申请某些国家学校或签证更灵活 | 具体招生规则逐校确认 |\n| 华侨生/外籍生路径讨论 | 土耳其护照可能被客户作为教育规划工具考虑 | 中国相关考试/入学资格政策严格，不能简单等同“有外国护照即可” |\n| 美国E-2随行教育 | E-2配偶/子女可随行在美生活学习 | E-2不是绿卡，长期教育稳定性不如绿卡 |\n\n建议：如果客户核心是子女教育，应将土耳其与香港、新加坡、美国、葡萄牙等路径对比，而不是单独以土耳其做教育终局。\n\n---\n\n## 十一、福利居住国规划\n\n土耳其不建议作为“福利国”核心方案。\n\n| 维度 | 土耳其表现 | 判断 |\n|---|---|---|\n| 教育 | 有国际学校，但非全球顶级教育目的地 | 辅助 |\n| 医疗 | 城市医疗可用，但不作为高福利医疗国 | 辅助 |\n| 养老 | 成本相对低，但语言和生活适应是问题 | 谨慎 |\n| 生育福利 | 非核心卖点 | 不推荐作为卖点 |\n| 综合福利 | 不如欧洲高福利国家 | 不作为福利国 |\n\n推荐定位：**土耳其 = 功能性护照 + E-2跳板 + 可退出房产投资；福利国另选。**\n\n---\n\n## 十二、预算明细汇总\n\n### 12.1 基础预算\n\n| 项目 | 金额/口径 | 是否必须 | 说明 |\n|---|---:|---|---|\n| 土耳其基金认购投资 | USD 500,000 | 必须 | 认购房地产投资基金份额，至少持有3年；具体锁定期以基金文件为准。 |\n| 基金发行费 | USD 50,000 | 必须 | 项目资料“土耳其基金项目快速签约单”口径。 |\n| 律师费 | USD 30,000/家庭 | 必须 | 项目资料费用表口径，实际以律师协议为准。 |\n| 护照翻译公证费 | USD 350/人 | 必须 | 项目资料费用表口径。 |\n| 移民保险费 | USD 60-300/人 | 必须 | 按年龄浮动。 |\n| 政府官方申请费 | 主申USD 401；配偶/子女USD 177/人 | 必须 | 含居留许可、居留卡、签证、护照、身份证等官方费用口径。 |\n| 国内公证/认证/翻译 | 按实际材料计 | 必须 | 一般公证约900元/份；异地公证可能加收；认证普通约980元/本，按票据多退少补。 |\n| 海牙认证/POA | 约RMB 4,200/份或按领馆/翻译实际收费 | 通常必须 | 根据Plan A领馆签署或Plan B海牙认证确定。 |\n| 三方材料费合计 | 参考RMB 20,000 | 预估 | 项目资料基金费用预算表口径，需按家庭成员和材料数量复核。 |\n| 服务费 | 按签约单/合同 | 必须/视服务模式 | 需结合渠道、报价版本、合同口径确认。 |\n| 后续E-2美国公司 | 另行预算 | 可选 | 如客户后续使用土耳其护照申请E-2，需另行设计美国商业投资。 |\n\n### 12.1.1 三方费用清单（含官方费用）\n\n| 类别 | 费用项目 | 收费机构/对象 | 参考金额 | 付款节点 | 备注 |\n|---|---|---|---:|---|---|\n| 投资款 | 基金认购份额 | 基金/托管账户 | USD 500,000 | 签约及账户确认后 | 主申请人认购房地产投资 | 顾问 | 退出与续持日程表 |\n\n```text\n客户确认基金路径\n      ↓\n基金/律师尽调确认\n      ↓\n准备家庭成员材料 + 公证认证\n      ↓\n签署POA与基金认购文件\n      ↓\n客户付款至基金募集/托管账户\n      ↓\n基金方确认到账并登记份额\n      ↓\n律师递交居留许可申请\n      ↓\n录指纹/补件\n      ↓\n律师递交入籍申请\n      ↓\n政府审批\n      ↓\n身份获批，领取土耳其护照\n      ↓\n建立锁定期与退出管理表\n```\n\n### 13.3 本周立即行动清单\n\n| 编号 | 动作 | 目的 |\n|---|---|---|\n| 1 | 确认客户家庭成员年龄和是否随行 | 判断是否全部可同步入籍 |\n| 2 | 确认客户核心目标：护照/E-2/教育/资产/税务 | 避免路径错配 |\n| 3 | 确认资金来源和出境路径 | 排除P0合规风险 |\n| 4 | 调取项目资料基金费用清单、快速签约单和文件清单 | 形成正式报价和材料包 |\n| 5 | 联系土耳其律师核验最新基金路径和法案适配 | 官方落地确认 |\n| 6 | 明确是否需要基金方/项目方说明会 | 决定是否启用基金尽调 |\n\n\n## 十四、重要风险声明\n\n### 14.1 国籍风险\n\n**中国不承认双重国籍。客户取得土耳其国籍后，如在中国出入境或境内身份使用中发生交叉使用，可能触发国籍冲突和行政风险。土耳其护照只能作为境外功能性身份工具使用。**\n\n### 14.2 房产风险\n\n**土耳其基金路径通常要求投资份额至少持有3年。锁定期结束后的赎回价格、退出时间、基金资产变现能力、汇率和管理人运营能力均存在不确定性，不保证本金安全或收益。**\n\n### 14.3 政策风险\n\n**土耳其投资入籍政策曾多次调整，2022年已由USD 250,000提高至USD 400,000。未来仍可能提高门槛、收紧审查或调整材料要求。正式签约前必须由土耳其律师核验最新法案。**\n\n### 14.4 E-2风险\n\n**土耳其护照只是E-2资格前提之一，不代表自动获得美国E-2签证。E-2要求真实美国投资、真实经营、非边缘企业、商业计划和持续运营。E-2不是绿卡，也不直接通向美国永久居民身份。**\n\n### 14.5 税务风险\n\n**取得土耳其护照不等于改变中国税务居民身份，也不等于避税。若客户未来长期居住土耳其或美国，可能触发当地税务居民规则和全球收入申报义务。**\n\n### 14.6 资金出境风险\n\n**任何地下钱庄、虚假贸易、现金搬运、第三方不明代付都属于重大合规风险。本方案必须以可解释、可追踪、可留痕的资金路径为前提。**\n\n---\n\n## 附件：引用法律法规与项目资料来源\n\n### A. 本次方案引用到的法律依据清单\n\n| 法案/规则 | 条款/款项 | 本次用途 | 最新更新时间 | 备注 |\n|---|---|---|---|---|\n| 《土耳其公民法》（Turkish Citizenship Law No. 5901） | 第12条：Exceptional acquisition of Turkish citizenship | 土耳其投资入籍的上位法依据，允许符合条件的外国人以特殊方式取得土耳其国籍 | 本次核验：2026-06-07 | 需结合实施条例和总统/主管机关批准流程适用。 |\n| 《土耳其公民法实施条例》（Regulation on the Implementation of the Turkish Citizenship Law） | 第20条 | 规定投资入籍的具体路径、门槛和确认机关 | 2022-05-13官方公报修订；2022-06-13生效；本次核验：2026-06-07 | 本方案核心执行条款。 |\n| 《土耳其公民法实施条例》 | 第20条第2款第(e)项 | 规定房地产投资基金/风险投资基金份额资料：投资不少于USD 500,000并至少持有3年 | 本次核验：2026-06-07 | 本方案“土耳其基金移民”的直接条款依据。 |\n| 《土耳其公民法实施条例》 | 第20条房地产购买相关项 | 规定购房入籍资料：购买不低于USD 400,000房产并持有3年 | 2022-05-13官方公报修订，2022-06-13生效 | 本方案中仅作为备选路径和政策对比。 |\n| 《外国人和国际保护法》（Law No. 6458 on Foreigners and International Protection） | 第31条第1款第(j)项 | 投资人短期居留许可依据，通常作为入籍申请前置步骤 | 本次核验：2026-06-07 | 居留许可与入籍申请衔接使用。 |\n| 土耳其资本市场委员会 CMB/SPK《房地产投资基金公报》（Communiqué III-52.3） | REIF设立、运作、资产配置、基金管理规则 | 判断房地产投资基金是否为合规基金产品 | 2014-02-03发布；2014-07-01生效；2024-07-17重要修订；2026-04-29有进一步监管口径 | 基金路径必须核查基金是否在CMB监管框架内。 |\n| CMB/SPK关于REIF/PREIF的后续修订和决定 | 项目型房地产投资基金、预售协议纳入组合等相关规则 | 影响基金底层资产、合规结构和退出风险 | 2024-07-17；2026-04-29 | 需由土耳其律师和基金管理人确认具体基金是否适用。 |\n| 美国《移民与国籍法》（Immigration and Nationality Act, INA） | 101(a)(15)(E) | E-2条约投资人签证法源 | 本次核验：2026-06-07 | 土耳其护照后续衔接美国E-2的总依据。 |\n| 美国国务院《外交事务手册》（9 FAM 402.9） | E-1/E-2 Treaty Trader and Treaty Investor | E-2签证审查标准：条约国国籍、实质投资、真实企业、非边缘企业、开发并指挥企业等 | 2026-02-17刷新口径；本次核验：2026-06-07 | E-2不是绿卡，需独立商业计划和运营证明。 |\n| 美国Public Law 117-263相关E签证修订 | 金融投资取得条约国国籍者的3年居住/住所要求 | 影响通过投资入籍取得土耳其国籍后立即申请E签证的可行性 | 2022-12-27生效；本次核验：2026-06-07 | 若客户取得土耳其国籍后拟申请E-2，必须由美国移民律师专项判断是否触发连续3年住所要求。 |\n| 《中华人民共和国国籍法》 | 第3条 | 中国不承认中国公民具有双重国籍 | 现行有效；本次核验：2026-06-07 | 土耳其允许双重国籍，不等于中国承认双重国籍。 |\n| 《中华人民共和国国籍法》 | 第9条 | 中国公民自愿加入外国国籍的，自动丧失中国国籍 | 现行有效；本次核验：2026-06-07 | 属最高风险条款，客户必须接受国籍冲突风险提示。 |\n| 《中华人民共和国出境入境管理法》 | 与中国护照、出入境证件、边检身份一致性相关条款 | 提醒第三国护照不得用于中国出入境切换或制造身份冲突 | 现行有效；本次核验：2026-06-07 | 需中国律师确认具体适用，执行中必须保持中国出入境证件一致。 |\n\n### B. 多个法案之间的相互影响\n\n| 组合 | 相互影响 | 需要注意的点 |\n|---|---|---|\n| 土耳其《公民法》+ 实施条例 + CMB基金规则 | 《公民法》给投资入籍入口，实施条例给具体投资门槛，CMB规则决定基金是否合规 | 三者必须同时满足；只买基金不等于自动入籍。 |\n| 实施条例第20条第2款第(e)项 + 基金锁定规则 | 投资基金份额需至少持有3年 | 3年内不得擅自赎回、转让或解除锁定，否则可能影响身份链条。 |\n| 外国人和国际保护法第31条第1款第(j)项 + 入籍申请 | 投资人通常需先取得短期居留许可，再递交入籍 | 居留许可材料、保险、无犯罪、录指纹等不能跳过。 |\n| CMB基金规则 + 基金产品文件 | CMB监管框架是底层合规，基金要素表/认购协议是客户签约依据 | 要核查管理人、托管银行、审计机构、底层资产、管理费、退出条款。 |\n| 土耳其国籍 + 美国E-2 | 土耳其是E-2条约国，理论上可作为赴美跳板 | E-2需独立满足美国规则；尤其注意投资入籍取得国籍后的3年住所要求问题。 |\n| 美国E-2 + 中国国籍边界 | E-2申请可能使用土耳其国籍，但中国出入境仍涉及中国国籍法边界 | 不得把土耳其护照用于中国出入境切换；避免造成国籍冲突。 |\n| 土耳其允许双重国籍 + 中国不承认双重国籍 | 两国国籍制度不一致 | 对客户表达必须使用“境外功能性身份”而非“中国承认双国籍”。 |\n| 土耳其身份 + 中国税务居民 | 获得土耳其护照不自动改变中国税务居民身份 | 全球资产、CRS、CFC、个人所得税仍需独立评估。 |\n\n### C. 法律适用注意事项\n\n1. **条款层级**：本项目以《土耳其公民法》第12条作为上位法，以实施条例第20条作为投资入籍操作依据，以第20条第2款第(e)项作为基金路径依据。\n2. **基金路径必须双重核验**：既要核验是否满足入籍条例，也要核验基金是否符合CMB/SPK监管要求。\n3. **锁定期是身份安全阀**：无论产品文件写3年还是3.5年，客户都不得在法定/合同锁定期内擅自退出。\n4. **E-2不是自动收益**：土耳其护照只是E-2资格基础之一，美国仍审查实质投资、真实企业、非边缘性、控制权、离境意图等。\n5. **E-2三年住所要求需专项审查**：若客户是通过投资入籍取得土耳其国籍，美国律师必须判断Public Law 117-263项下是否需要在土耳其连续居住/住所满3年后才可申请E签证。\n6. **中国国籍风险不能淡化**：《中国国籍法》第3条、第9条是本方案最重要的中国法风险边界；所有客户沟通口径必须避免承诺“双重国籍安全”。\n7. **出入境身份一致性**：中国出入境应保持中国护照/中国身份一致，不建议在中国边检场景使用第三国护照。\n8. **税务和身份分开判断**：取得土耳其护照不等于改变税务居民身份，若客户长期居住土耳其、美国或其他国家，需另做税务居民测算。\n9. **最终落地三方确认**：土耳其律师确认法条和递交流程，基金方确认产品和托管文件，中国/国际税务师确认资金来源与税务后果。\n\n### D. 交付前客户需补充与确认资料\n\n1. 客户完整家庭信息与随行成员名单。\n2. 主申请人及随行成员护照、身份证、户口本、婚姻/出生证明。\n3. 资金来源证明、境内外账户流水与资金出境路径说明。\n4. 基金募集文件、认购协议、托管银行信息、审计机构信息、退出规则。\n5. 土耳其律师出具的最新材料清单和法案适配确认。\n6. 如后续衔接美国E-2，需另行提供美国商业计划初稿和美国移民律师意见。\n";
