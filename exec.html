<script>

function crc32(str){var table=window._crcTable;if(!table){table=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));table[n]=c>>>0;}window._crcTable=table;}var crc=0^(-1);for(var i=0;i<str.length;i++){crc=(crc>>>8)^table[(crc^str.charCodeAt(i))&0xff];}return (crc^(-1))>>>0;}
function u16(n){return String.fromCharCode(n&255,(n>>>8)&255)}function u32(n){return String.fromCharCode(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}
function makeZipBlob(filename,content){var data=unescape(encodeURIComponent(content));var name=unescape(encodeURIComponent(filename));var crc=crc32(data);var local='PK\x03\x04'+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+name+data;var central='PK\x01\x02'+u16(20)+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(data.length)+u32(data.length)+u16(name.length)+u16(0)+u16(0)+u16(0)+u16(0)+u32(0)+u32(0)+name;var end='PK\x05\x06'+u16(0)+u16(0)+u16(1)+u16(1)+u32(central.length)+u32(local.length)+u16(0);var zip=local+central+end;var bytes=new Uint8Array(zip.length);for(var i=0;i<zip.length;i++)bytes[i]=zip.charCodeAt(i)&255;return new Blob([bytes],{type:'application/zip'});}

function q(k){return new URL(location.href).searchParams.get(k)||''}
function toast(t){var x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(function(){x.classList.remove('show')},1600)}
var projectMap={'tr-fund-cbi':'土耳其房地产投资基金入籍','tr-fund-e2':'土耳其基金入籍 + 美国E-2后续规划','tr-realestate':'土耳其购房入籍','tr-realestate-cbi':'土耳其购房入籍','tr-realestate-education':'土耳其购房入籍 + 子女教育/华侨生规划','tr-deposit-cbi':'土耳其银行存款入籍','tr-bonds-cbi':'土耳其政府债券入籍'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function inlineMd(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>')}
function mdToHtml(md){var lines=String(md||'').replace(/\r\n/g,'\n').split('\n'),html='',inList=false,inTable=false,table=[];function closeList(){if(inList){html+='</ul>';inList=false}}function closeTable(){if(!inTable)return;html+='<div class="table-wrap"><table>';for(var i=0;i<table.length;i++){var cells=table[i].split('|').slice(1,-1).map(function(c){return c.trim()});if(i===1&&cells.every(function(c){return /^:?-{3,}:?$/.test(c)}))continue;html+='<tr>'+(i===0?cells.map(function(c){return '<th>'+inlineMd(c)+'</th>'}).join(''):cells.map(function(c){return '<td>'+inlineMd(c)+'</td>'}).join(''))+'</tr>'}html+='</table></div>';inTable=false;table=[]}for(var i=0;i<lines.length;i++){var line=lines[i].trimEnd();if(!line){closeList();closeTable();continue}if(/^!\[.*\]\(.+\)$/.test(line)){var im=line.match(/^!\[(.*)\]\((.+)\)$/);if(im){html+='<p style="text-align:center;margin:16px 0"><img src="'+im[2]+'" alt="'+im[1]+'" style="width:100%;max-width:800px;border-radius:12px;border:1px solid #e5e7eb" onerror="this.src=decodeURIComponent(this.src).replace(/%25/g,\'%\');this.onerror=null"></p>';continue}}if(/^```/.test(line)){continue}if(/^\|.*\|$/.test(line)){closeList();inTable=true;table.push(line);continue}closeTable();if(/^#{1,6}\s+/.test(line)){closeList();var lv=line.match(/^#{1,6}/)[0].length;html+='<h'+lv+'>'+inlineMd(line.replace(/^#{1,6}\s+/,''))+'</h'+lv+'>';continue}if(/^[-*]\s+/.test(line)){if(!inList){html+='<ul>';inList=true}html+='<li>'+inlineMd(line.replace(/^[-*]\s+/,''))+'</li>';continue}closeList();html+='<p>'+inlineMd(line)+'</p>'}closeList();closeTable();return html}

function calc(){
  var N=parseInt(document.getElementById('fm').value)||4;
  if(N<1)N=1;if(N>10)N=10;
  var USD=7.20;
  var INV=500000;
  var fees=[
    {n:'基金投资认购款', u:INV, d:'固定 $500,000'},
    {n:'基金发行费', u:50000, d:'固定 $50,000'},
    {n:'律师费（家庭）', u:30000, d:'固定 $30,000'},
    {n:'护照翻译公证费', u:350*N, d:'$350/人 × '+N+'人'},
    {n:'移民保险费', u:300*N, d:'$60-300/人 × '+N+'人（按高值）'},
    {n:'主申请人官方申请费', u:401, d:'固定（主申）'},
    {n:'配偶/子女官方申请费', u:177*(N-1), d:'$177/人 × '+(N-1)+'人'},
    {n:'国内公证/认证/翻译', u:2778, d:'约RMB 20,000'},
    {n:'POA/海牙认证', u:583, d:'约RMB 4,200'},
    {n:'快递及其他杂费', u:300, d:'预估'}
  ];
  var totalFees=0;
  var html='<div class="ft-wrap"><table class="ft"><tr><th>费用项目</th><th>公式</th><th>美元</th><th>人民币(万)</th></tr>';
  html+='<tr><td>🏦 基金认购投资额</td><td>≥$500,000</td><td class="r">$'+INV.toLocaleString()+'</td><td class="r rmb">¥'+(INV*USD/10000).toFixed(2)+'万</td></tr>';
  for(var i=1;i<fees.length;i++){
    var f=fees[i]; totalFees+=f.u;
    html+='<tr><td>'+(i)+'. '+f.n+'</td><td class="mu">'+f.d+'</td><td class="r">$'+f.u.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r rmb">¥'+(f.u*USD/10000).toFixed(2)+'万</td></tr>';
  }
  var T=INV+totalFees;
  html+='<tr class="tr"><td>💰 费用合计(不含投资)</td><td>-$'+totalFees.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r">$'+totalFees.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r rmb">¥'+(totalFees*USD/10000).toFixed(2)+'万</td></tr>';
  html+='<tr class="gr"><td>🏦 总投资(含基金认购)</td><td>$'+T.toLocaleString()+'</td><td class="r">$'+T.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td class="r rmb">¥'+(T*USD/10000).toFixed(2)+'万</td></tr>';
  html+='</table></div><p class="mu" style="margin-top:8px">📌 汇率1USD=¥7.20 | '+N+'人家庭(主申+配偶+子女) | 投资本金$500,000锁定期满可退出</p>';
  document.getElementById('cr').innerHTML=html;
  var w=document.getElementById('cw');
  w.innerHTML='✅ 基金投资额$500,000满足入籍门槛<br>⚠️ 注意：基金份额需至少持有3年，锁定期满后按基金规则赎回<br>💡 与购房相比：无需选房、评估、过户，无房产管理负担';
  w.style.background='#fef3c7';w.style.color='#92400e';
  updateSection12_1();
}

function buildDynamicBudgetHTML(N){
  return '<div id="sec12_1_wrapper">'+buildBudgetTable(N)+'</div>';
}
function buildBudgetTable(N){
  var USD=7.20;
  var INV=500000;
  var fees=[
    {n:'基金投资认购款', u:INV, d:'≥$500,000'},
    {n:'基金发行费', u:50000, d:'$50,000'},
    {n:'律师费（家庭）', u:30000, d:'$30,000'},
    {n:'护照翻译公证费', u:350*N, d:'$350×'+N+'人'},
    {n:'移民保险费', u:300*N, d:'$300×'+N+'人'},
    {n:'主申请人官方申请费', u:401, d:'主申$401'},
    {n:'配偶/子女官方申请费', u:177*(N-1), d:'$177×'+(N-1)+'人'},
    {n:'国内公证/认证/翻译', u:2778, d:'≈RMB 20,000'},
    {n:'POA/海牙认证', u:583, d:'≈RMB 4,200'},
    {n:'快递及其他杂费', u:300, d:'预估'}
  ];
  var totalFees=0, tbody='';
  tbody+='<tr><td>🏦 基金认购投资额</td><td style="font-size:11px;color:#9ca3af">≥$500,000</td><td style="text-align:right;white-space:nowrap">$'+INV.toLocaleString()+'</td><td style="text-align:right;white-space:nowrap;color:#b91c1c;font-weight:600">¥'+(INV*USD/10000).toFixed(2)+'万</td></tr>';
  for(var i=1;i<fees.length;i++){
    var f=fees[i]; totalFees+=f.u;
    tbody+='<tr><td>'+(i)+'. '+f.n+'</td><td style="font-size:11px;color:#9ca3af">'+f.d+'</td><td style="text-align:right;white-space:nowrap">$'+f.u.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td style="text-align:right;white-space:nowrap;color:#b91c1c;font-weight:600">¥'+(f.u*USD/10000).toFixed(2)+'万</td></tr>';
  }
  var T=INV+totalFees;
  var fmt=function(v){return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
  var h='<div style="background:#fef3c7;padding:14px;border-radius:10px;text-align:center;margin-bottom:14px;font-weight:700;color:#92400e;font-size:15px">📊 <b>动态预算（'+N+'人家庭）</b><br><span style="font-weight:400">费用合计 <b>$'+fmt(totalFees)+'</b>（¥'+(totalFees*USD/10000).toFixed(2)+'万）</span><br><span style="font-weight:400"><b>总投资 $'+fmt(T)+'</b>（¥'+(T*USD/10000).toFixed(2)+'万 含基金认购款）</span></div>';
  h+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e5e7eb;border-radius:8px;margin:10px 0">';
  h+='<table style="border-collapse:collapse;width:100%;font-size:13px;min-width:560px">';
  h+='<tr style="background:#fef3c7;color:#92400e"><th style="padding:7px 6px;text-align:left">项目</th><th style="padding:7px 6px;text-align:left">公式</th><th style="padding:7px 6px;text-align:right">美元</th><th style="padding:7px 6px;text-align:right">人民币(万)</th></tr>';
  h+=tbody;
  h+='<tr style="background:#fef9c3;font-weight:700;border-top:2px solid #f59e0b"><td colspan="2">💰 费用合计(不含投资)</td><td style="text-align:right;white-space:nowrap">$'+fmt(totalFees)+'</td><td style="text-align:right;white-space:nowrap;color:#b91c1c;font-weight:600">¥'+(totalFees*USD/10000).toFixed(2)+'万</td></tr>';
  h+='<tr style="background:#fee2e2;font-weight:800;font-size:14px"><td colspan="2">🏦 总投资(含基金认购)</td><td style="text-align:right;white-space:nowrap">$'+fmt(T)+'</td><td style="text-align:right;white-space:nowrap;color:#991b1b;font-size:14px">¥'+(T*USD/10000).toFixed(2)+'万</td></tr>';
  h+='</table></div>';
  return h;
}
function updateSection12_1(){
  var docEl=document.getElementById('docView');
  if(!docEl) return;
  var N=parseInt(document.getElementById('fm').value)||4;
  var wrapper=document.getElementById('sec12_1_wrapper');
  if(wrapper){
    wrapper.outerHTML=buildDynamicBudgetHTML(N);
  }else{
    var html=docEl.innerHTML;
    html=html.split('<p>__BUDGET_12_1__</p>').join(buildDynamicBudgetHTML(N));
    docEl.innerHTML=html;
  }
}
function checkPwd(){
  if(document.getElementById('pwd').value==='888888'){
    document.getElementById('commission').classList.add('show');
    document.getElementById('commission').scrollIntoView({behavior:'smooth'});
  }else{toast('密码错误，请重试')}
}

function buildPlan(){
 var issue=q('issue')||'未关联';var solution=q('solution')||'A';var project=q('project')||'tr-fund-cbi';var projectName=projectMap[project]||project;

var md=`# 土耳其基金投资入籍执行策划案\n\n> 生成日期：${new Date().toLocaleDateString('zh-CN')}  \n> 适用对象：拟通过土耳其房地产投资基金（REIF）入籍取得第二身份的家庭/企业主  \n> 文档版本：客户交付版 V1.0 · Issue #${issue} · 方案 ${solution}  \n> 重要声明：本策划案为商业规划与执行框架，不构成法律、税务、投资或移民建议；落地前须由土耳其持牌律师、税务师、基金管理人和银行进行最终确认。\n\n> 💡 **使用提示**：页面顶部的智能费用计算器已根据您的家庭成员数自动生成预算明细，点击上方【下一步】按钮后在方案中查看实时预算联动结果。\n\n---\n\n## 摘要结论\n\n本方案建议客户以"土耳其房地产投资基金（REIF）入籍"为主路径：通过认购不少于50万美元的合规房地产投资基金份额，满足法案规定的投资与持有要求后，申请土耳其公民身份。该路径的核心价值不在于移居土耳其，而在于取得一个周期较短、路径清晰、可作为全球身份配置工具的第二身份。\n\n与购房入籍相比，基金路径三大优势：第一，无需选房、比较、评估、过户，投资决策标准化程度高；第二，份额以美元计价，天然对冲里拉汇率风险；第三，锁定期满后按基金规则赎回退出，无需自行出售房产。与存款入籍相比，基金投的是美元资产而非里拉，本金安全边际显著提升。\n\n本方案的执行重点有三项：第一，投资基金必须满足土耳其投资入籍法案及资本市场委员会（CMB）监管要求；第二，客户资金来源和跨境付款路径必须可解释、可追踪、可留痕；第三，取得土耳其身份后仍需严格管理中国国籍、税务居民和出入境身份边界。\n\n---\n\n## 一、客户家庭基本信息（待补充版）\n\n### 1.1 已知/默认信息\n\n| 项目 | 当前信息 | 状态 |\n|---|---|---|\n| 客户身份 | 中国籍家庭/企业主/高净值客户 | ⚠️ 待确认 |\n| 核心目标 | 取得第二本护照、增强全球流动性、可选作为E-2赴美跳板 | ⚠️ 待确认 |\n| 预算范围 | 基金认购 USD 500,000 + 发行费 USD 50,000 + 相关费用 | ✅ 已知政策门槛 |\n| 家庭成员 | 主申请人、配偶、18岁以下子女可随行 | ⚠️ 待确认家庭结构 |\n| 是否放弃中国国籍 | 默认不主动处理中国国籍问题 | ⚠️ 需强制风险提示 |\n| 是否计划在土耳其居住 | 默认无长期居住计划 | ⚠️ 待确认 |\n| 是否计划赴美 | 若目标含美国E-2，需另设美国公司与商业计划 | ⚠️ 待确认 |\n| 资金来源 | 基金认购款、律师费、服务费需合规出境 | ❌ 待确认 |\n| 税务身份 | 中国税务居民为默认假设 | ⚠️ 待确认 |\n| 是否有敏感合规问题 | 地下钱庄、未申报境外资产、资金来源瑕疵等 | ❌ 待确认 |\n\n### 1.2 待解决问题分级\n\n| 编号 | 问题 | 严重度 | 说明 |\n|---|---|---|---|\n| Q1 | 土耳其身份目标是否清晰 | P1 | 土耳其适合"功能性护照/E-2跳板/华侨生可能性讨论"，不适合作为高福利长期居住国。 |\n| Q2 | 资金出境路径是否合法 | P0 | USD 500,000+资金出境必须合规，严禁地下钱庄或虚假贸易。 |\n| Q3 | 中国国籍冲突风险 | P0 | 中国不承认双重国籍；第三国护照严禁用于中国出入境。 |\n| Q4 | 基金合规性与退出风险 | P1 | 基金必须满足CMB监管和入籍法案双重合规要求；锁定期和退出规则需明确。 |\n| Q5 | 是否将土耳其作为E-2跳板 | P1 | E-2不是绿卡，需真实美国商业投资和运营。 |\n| Q6 | 家庭成员年龄 | P1 | 18岁以下子女可随行；成年子女通常不能随主申请人同步入籍。 |\n| Q7 | 税务居民风险 | P2 | 土耳其通常以183天居住触发税务居民；若不长期居住，税务影响相对可控。 |\n\n### 1.3 根本判断\n\n**表面问题**：客户想办一个土耳其护照。  \n**真实问题**：客户需要一个成本可控、周期较短、可退出、能增强全球流动性并可能衔接美国E-2的功能性身份工具，但必须在中国国籍、资金出境、基金合规性、税务居民风险之间做边界管理。\n\n---\n\n## 二、核心策略\n\n### 2.1 三分离定位\n\n| 维度 | 土耳其方案中的定位 | 判断 |\n|---|---|---|\n| 事业国 | 通常仍为中国，除非客户在土耳其/美国有实质业务 | 不建议为拿身份虚构土耳其经营 |\n| 居住国 | 中国 + 可选土耳其短期停留/美国E-2阶段性居住 | 土耳其不作为主要生活地 |\n| 福利国 | 土耳其护照本身不是强福利工具 | 不以福利为核心卖点 |\n| 管钱地 | 香港/新加坡/迪拜等更适合 | 土耳其不作为首选资产管理中心 |\n| 功能性身份 | 土耳其护照 + E-2条约国属性 | 这是核心价值 |\n\n### 2.2 推荐核心路线\n\n**推荐方案A：土耳其50万美元房地产投资基金（REIF）入籍 + 3年锁定 + 后续视需要衔接美国E-2。**\n\n理由：\n1. **门槛清晰**：认购不少于USD 500,000的土耳其房地产投资基金份额，至少持有3年。\n2. **美元计价**：基金份额美元计价，天然对冲里拉贬值风险（与存款入籍的本质区别）。\n3. **无房产管理负担**：无需选房、评估、过户、出租、维护物业，流程标准化。\n4. **可退出**：基金锁定期结束后按基金规则赎回，流动性和估值通常比单一房产更标准化。\n5. **周期可控**：通常6-8个月完成审批。\n6. **E-2跳板价值**：土耳其为美国E-2条约国，取得土国籍后可在满足条件时申请E-2。\n7. **不要求长期居住**：适合仍以中国为事业国、居住国的企业主家庭。\n\n### 2.3 三路径对比分析\n\n| 路径 | 投资金额 | 资产特征 | 持有期 | 美元计价 | 退出机制 | 管理费用 | 适用场景 |\n|---|---|---|---|---|---|---|---|\n| 基金入籍（推荐） | ≥USD 500,000 | 基金份额 | 3年 | ✅ 美元计价 | 赎回份额 | 管理费3%/年 | 偏好标准化金融产品 |\n| 购房入籍 | ≥USD 400,000 | 实物房产 | 3年 | ✅ 美元计价 | 出售房产 | 物业+税费 | 偏好实物资产 |\n| 存款入籍 | ≥USD 500,000 | 里拉存款 | 3年 | ❌ 里拉风险 | 取出存款 | 无 | 追求流程简单（⚠️不推荐） |\n\n---\n\n## 三、合规清理详细方案\n\n### 3.1 资金来源合规\n\n| 环节 | 合规要求 | 风险点 | 执行动作 |\n|---|---|---|---|\n| 资金来源 | 能解释基金认购资金来源 | 现金收入、代持、地下钱庄 | 准备收入证明、纳税记录、企业分红/借款文件 |\n| 资金出境 | 从合规账户支付至基金托管账户 | 私下换汇、地下钱庄 | 优先评估ODI、家庭合规换汇、境外已有资产路径 |\n| 银行流水 | 需保留银行转账凭证 | 现金/第三方代付 | 付款全程银行可追踪 |\n| 基金认购 | 需基金合规文件、基金要素表、认购协议、风险揭示书 | 私募假基金、虚假产品 | 核验基金管理人、托管银行、审计机构、法律顾问 |\n| 资金确认 | 资金到基金募集账户/指定托管账户 | 账户错误、非官方收款 | 严格按基金文件与律师指引付款 |\n| 认购锁定 | 需满足至少3年持有期 | 中途退出导致身份失效 | 事前确认锁定期和退出规则 |\n\n### 3.2 中国国籍边界\n\n红线：**土耳其护照仅限境外金融、税务、签证、身份规划用途，严禁用于中国出入境。**\n\n执行要求：\n- 中国出入境继续使用中国护照。\n- 不在中国境内主动展示或使用土耳其护照作为身份证明。\n- 不用土耳其护照申请中国签证后"外籍身份回国"。\n- 不制造"中国护照+土耳其护照交叉使用"记录。\n\n### 3.3 反洗钱与银行审查\n\n土耳其银行、基金管理、E-2后续美国银行开户都会审查资金来源。客户需提前准备：\n- 主申请人护照、身份证、户口本、婚姻证明。\n- 无犯罪记录。\n- 收入证明、完税证明、企业营业执照、审计报表。\n- 基金认购资金流水及换汇/出境路径说明。\n- 如为公司分红/股东借款，准备董事会决议、分红决议、借款协议。\n\n---\n\n## 四、境外资金归集与投资架构\n\n### 4.1 推荐资金路径\n\n| 路径 | 适用客户 | 优点 | 缺点 |\n|---|---|---|---|\n| 家庭合规换汇 | 资金量不大、时间充裕 | 成本低、风险低 | 年度额度有限，不适合一次性大额 |\n| 境外已有资产支付 | 已有香港/新加坡/美元资产 | 付款效率高 | 需解释历史来源 |\n| ODI商业投资路径 | 客户有企业、确有境外业务 | 合规性强，可服务后续架构 | 周期长，材料复杂 |\n| 境外分红/股东借款 | 已有境外公司或家族架构 | 可解释资金用途 | 需税务和转让定价配合 |\n| 地下钱庄 | 不建议 | 表面快 | P0红区，严禁使用 |\n\n### 4.2 资金预算框架\n\n📐 请使用页面顶部计算器，点击下一步后自动计算预算\n\n| 项目 | 预算口径 | 说明 |\n|---|---:|---|\n| 基金认购投资 | ≥USD 500,000 | 入籍主路径，持有3年 |\n| 基金发行费 | USD 50,000 | 基金方收取（项目资料快速签约单口径） |\n| 律师费 | USD 30,000/家庭 | 含申请递交全流程 |\n| 官方及三方费用 | 按家庭成员人数变动 | 请使用计算器按家庭人数自动核算 |\n| 服务费 | 按合同/报价表 | 需结合渠道、报价版本确认 |\n\n> 📐 **精确预算请使用页面顶部的智能费用计算器**，输入家庭成员数即可自动生成所有费用明细。\n\n---\n\n## 五、基金选择指南\n\n### 5.1 基金选择核心原则\n\n| 原则 | 说明 |\n|---|---|\n| 基金资质清晰 | 必须核查基金管理人、托管银行、审计机构、法律顾问。 |\n| 法案适配 | 基金要素必须被《土耳其公民法实施条例》第20条第2款第(e)项认可。 |\n| 锁定期明确 | 需明确至少3年锁定与退出规则。 |\n| 退出机制明确 | 优先选择有标准化赎回或份额转让机制的产品。 |\n| 底层资产透明 | 了解基金投资的房地产资产类型（商业/住宅/混合）、城市分布、回报特征。 |\n| 管理费清晰 | 明确管理费率、业绩报酬、赎回费用等全部成本。 |\n| 不追求高收益 | 本项目首要目标是身份，不是基金收益最大化。 |\n| 避免单一销售话术 | 必须由律师和第三方顾问复核基金文件。 |\n\n### 5.2 基金路径关键参数\n\n| 维度 | 本方案口径 |\n|---|---|\n| 基金类型 | 房地产投资基金（REIF） |\n| 监管机构 | 土耳其资本市场委员会（CMB/SPK），依据Communiqué III-52.3 |\n| 投资门槛 | USD 500,000或等值货币 |\n| 基金发行费 | USD 50,000（项目资料快速签约表口径） |\n| 律师费 | USD 30,000/家庭（项目资料费用表口径） |\n| 管理费 | 约3%/年（以基金文件确认为准） |\n| 锁定期 | 3年（法案要求）\n| 投资方向 | 成熟商业地产/房地产资产组合 |\n| 退出路径 | 锁定期结束后赎回份额，或按基金规则退出 |\n| 适合客户 | 不想选房、不想承担单一房产交易复杂度、偏好标准化金融产品的客户 |\n\n### 5.3 基金 vs 购房：核心差异\n\n| 维度 | 基金入籍 | 购房入籍 |\n|---|---|---|\n| 投资决策 | 评估基金文件和管理人 | 评估单一房产（位置/价格/质量/产权） |\n| 交易复杂度 | 低（签署认购协议+付款） | 高（选房→评估→合同→实地→过户→TAPU） |\n| 持有管理 | 无（基金方管理底层资产） | 有（物业维护、地震保险、年税） |\n| 退出方式 | 赎回基金份额 | 出售房产 |\n| 退出流动性 | 通常更标准化 | 取决于房产位置和行情 |\n| 投资门槛 | USD 500,000 | USD 400,000 |\n| 总成本 | 约$85,000+（费用部分） | 房价×3.742%+$12,856 |\n\n### 5.4 不建议做法\n\n- 不建议只听销售口径，不看基金募集文件、托管安排和审计安排。\n- 不建议忽视锁定期和退出规则，只看"可回款"表述。\n- 不建议将基金收益作为核心承诺对客户表达。\n- 不建议用不合规资金路径完成基金认购。\n- 不建议未经基金合规核验即签署认购协议。\n\n---\n\n## 六、财富架构搭建方案\n\n土耳其护照本身不等于财富架构。建议把土耳其作为身份工具，资产管理仍放在更成熟的金融中心。\n\n### 6.1 推荐架构\n\n### 6.2 架构说明\n\n\`\`\`text\n中国事业主体/家庭资产\n        ↓ 合规资金路径\n香港/新加坡/迪拜账户或控股平台\n        ↓ 支付基金认购款/管理境外资产\n土耳其房地产投资基金份额（入籍资产，至少持有3年）\n        ↓ 锁定期满后\n赎回退出 / 续持 / 转换其他资产\n        ↓ 可选\n美国E-2公司（如客户有赴美经营需求）\n\`\`\`\n\n### 6.3 不建议架构\n\n- 不建议将全部境外资产集中在土耳其。\n- 不建议用土耳其公司承接中国主营业务利润。\n- 不建议为了E-2虚构美国业务。\n- 不建议以土耳其身份进行中国境内身份切换。\n\n---\n\n## 七、税务分析\n\n### 7.1 土耳其税务居民风险\n\n| 情形 | 税务判断 |\n|---|---|\n| 仅持有基金份额、不长期居住 | 通常不应因护照本身自动成为土耳其税务居民，但需律师/税务师确认。 |\n| 每年长期在土耳其居住 | 需评估183天规则和全球收入申报义务。 |\n| 基金赎回收益 | 基金赎回产生的收益可能在土耳其涉及资本利得税，需税务师确认适用规则和是否有双重征税协定减免。 |\n| 未来E-2赴美 | E-2本人可能因美国停留天数触发美国税务居民规则，需另行设计。 |\n| 中国仍为主要居住和事业地 | 中国税务居民身份通常仍持续。 |\n\n### 7.2 税务风险边界\n\n- 土耳其护照不是自动避税工具。\n- 基金赎回可能产生当地税费或汇兑损益。\n- 如后续进入美国E-2，需提前规划美国实质居住天数、公司利润、个人报税。\n- 若客户已有境外账户，应检查CRS、CFC、个人所得税申报风险。\n\n---\n\n## 八、资金跨境合规方案\n\n### 8.1 推荐执行路径\n\n| 阶段 | 动作 | 周期 |\n|---|---|---|\n| 第1阶段 | 客户资产和资金来源体检 | 1周 |\n| 第2阶段 | 确认资金出境资料：家庭换汇/境外存量/ODI/分红 | 1-4周 |\n| 第3阶段 | 开立或确认境外付款账户 | 1-3周 |\n| 第4阶段 | 土耳其律师确认基金托管账户和付款路径 | 1周 |\n| 第5阶段 | 银行转账支付基金认购款并留存凭证 | 按合同节点 |\n| 第6阶段 | 建立资金档案包，供入籍和后续银行/E-2使用 | 全程 |\n\n### 8.2 个人境外投资合规——37号文登记\n\n37号文全称《国家外汇管理局关于境内居民通过特殊目的公司境外投融资及返程投资外汇管理有关问题的通知》（汇发〔2014〕37号），是境内居民个人境外投资最重要的合规路径之一。\n\n**适用对象：** 境内居民个人以境外SPV进行境外投融资及返程投资。\n\n**核心要求：** 需在SPV设立后、出资前办理外汇登记（通过银行）。\n\n**未登记后果：** 无法合规注入境外资产；返程投资外汇无法入境；可能被认定逃汇。\n\n**操作要点：** 先登记后出资，不可补办；周期1-3个月；签约前律师确认适用性。\n\n### 8.3 严禁路径\n\n- 地下钱庄。\n- 现金搬运。\n- 虚假贸易。\n- 第三方代付且无合理解释。\n- 多人拆分汇款后无法解释最终受益人。\n\n---\n\n## 九、身份路径规划\n\n### 9.1 土耳其基金入籍主路径\n\n| 维度 | 内容 |\n|---|---|\n| 路径 | 认购土耳其房地产投资基金份额申请入籍 |\n| 投资金额 | ≥USD 500,000 |\n| 持有期 | 3年 |\n| 审批周期 | 通常6-8个月，实际以律师/政府进度为准 |\n| 居住要求 | 无长期居住要求 |\n| 随行成员 | 配偶 + 18岁以下子女 |\n| 双重国籍 | 土耳其允许，但中国不承认双重国籍 |\n| 主要价值 | 功能性护照、E-2条约国身份、美元计价标准化投资 |\n| 退出机制 | 锁定期满后按基金规则赎回 |\n| 核心优势 | 美元计价、无房产管理负担、流程标准化 |\n\n### 9.2 基金入籍流程（从签约到获批）\n\n| 步骤 | 动作 | 周期 |\n|---|---|---|\n| 1 | 确认选择基金路径，获取基金要素表 | 1-2周 |\n| 2 | 律师核查基金管理人、托管行和法案适配性 | 1-2周 |\n| 3 | 签署基金认购协议和POA授权 | 1周 |\n| 4 | 支付基金认购款至基金托管账户 | 按协议节点 |\n| 5 | 基金方确认份额登记并出具投资证明 | 1-2周 |\n| 6 | 申请短期居留许可 | 1-2月 |\n| 7 | 递交入籍申请 | 1月 |\n| 8 | 政府审批 | 3-6月 |\n| 9 | 获批，领取护照/身份证 | — |\n\n### 9.3 备选路径对比\n\n| 路径 | 门槛 | 适用场景 | 资产特征 | 美元计价 | 备注 |\n|---|---:|---|---|---|\n| 房地产投资基金 | USD 500,000 | 偏好标准化金融产品 | 基金份额 | ✅ 是 | 推荐本方案主路径 |\n| 购房入籍 | USD 400,000 | 偏好实物资产 | 实物房产 | ✅ 是 | 备选路径 |\n| 银行存款 | USD 500,000 | 追求流程最简单 | 里拉存款 | ❌ 否 | 汇率风险极高，不推荐 |\n| 政府债券 | USD 500,000 | 偏好固定收益 | 里拉债券 | ❌ 否 | 汇率风险同存款 |\n| 创造就业 | 50个就业 | 真正在土耳其经营 | 商业经营 | — | 不适合普通家庭 |\n\n### 9.4 E-2衔接逻辑\n\n土耳其公民可具备美国E-2申请资格，但E-2不是自动获得：\n\n| 条件 | 要求 |\n|---|---|\n| 国籍 | 申请人需为E-2条约国公民，如土耳其 |\n| 投资 | 在美国真实、活跃、非边缘业务中投入实质资金 |\n| 控制 | 申请人需拥有并控制美国企业 |\n| 商业计划 | 需说明业务真实运营、收入、雇佣、增长计划 |\n| 居留属性 | E-2为非移民签证，不是绿卡 |\n| 税务 | 美国停留天数和业务利润需另行税务规划 |\n| 重要限制 | 通过投资入籍取得土耳其国籍者，可能需要满足在土连续居住/住所满3年方可申请E签证（Public Law 117-263） |\n\n---\n\n## 十、教育规划\n\n土耳其身份在教育上有三种可能用途，需按客户子女年龄和目标判断。\n\n| 教育用途 | 价值 | 风险/限制 |\n|---|---|---|\n| 海外申请身份多元化 | 子女拥有第二国籍，申请某些国家学校或签证更灵活 | 具体招生规则逐校确认 |\n| 华侨生/外籍生路径讨论 | 土耳其护照可能被客户作为教育规划工具考虑 | 中国相关考试/入学资格政策严格，不能简单等同"有外国护照即可" |\n| 美国E-2随行教育 | E-2配偶/子女可随行在美生活学习 | E-2不是绿卡，长期教育稳定性不如绿卡 |\n\n建议：如果客户核心是子女教育，应将土耳其与香港、新加坡、美国、葡萄牙等路径对比，而不是单独以土耳其做教育终局。\n\n---\n\n## 十一、福利居住国规划\n\n土耳其不建议作为"福利国"核心方案。\n\n| 维度 | 土耳其表现 | 判断 |\n|---|---|---|\n| 教育 | 有国际学校，但非全球顶级教育目的地 | 辅助 |\n| 医疗 | 城市医疗可用，但不作为高福利医疗国 | 辅助 |\n| 养老 | 成本相对低，但语言和生活适应是问题 | 谨慎 |\n| 生育福利 | 非核心卖点 | 不推荐作为卖点 |\n| 综合福利 | 不如欧洲高福利国家 | 不作为福利国 |\n\n推荐定位：**土耳其 = 功能性护照 + E-2跳板 + 美元计价可退出基金投资；福利国另选。**\n\n---\n\n## 十二、预算明细汇总\n\n> 💡 以下为参考预算，精确费用请使用页面顶部**智能费用计算器**（输入家庭成员数即可自动生成）。\n\n### 12.1 实时预算（与计算器联动）\n\n__BUDGET_12_1__\n\n### 12.2 三路径费用对比概览\n\n| 费用项 | 基金入籍（本方案） | 购房入籍 | 存款入籍 |\n|---|---|---|---|\n| 投资款 | $500,000 | $400,000+ | $500,000 |\n| 发行费/交易成本 | $50,000发行费 | 房价×3.742%+$1,250 | 无 |\n| 入籍相关费用 | ~$34,000+ | ~$11,606固定 | ~$11,000 |\n| 律师费 | $30,000 | $4,000 | $4,000 |\n| 管理/持有成本 | ~3%/年 | 年房产税+保险+物业 | 无 |\n| 佣金 | $80,000 | 房价×20% | $1,000 |\n| 资产保值 | ✅ 美元计价 | ✅ 美元计价 | ❌ 里拉风险 |\n\n### 12.3 三方费用清单（含官方费用）\n\n| 类别 | 费用项目 | 收费机构/对象 | 参考金额 | 付款节点 | 备注 |\n|---|---|---|---:|---|---|\n| 投资款 | 基金认购份额 | 基金/托管账户 | USD 500,000 | 签约及账户确认后 | 主申请人认购REIF份额 |\n| 基金相关 | 基金发行费 | 基金方 | USD 50,000 | 认购阶段 | 项目资料快速签约单口径 |\n| 律师相关 | 律师费 | 土耳其律师/律所 | USD 30,000/家庭 | 签署协议后 | 含申请递交全流程 |\n| 文件相关 | 护照翻译公证费 | 土耳其公证/翻译机构 | USD 350/人 | 材料阶段 | 按申请人数计算 |\n| 保险相关 | 移民保险费 | 保险公司 | USD 60-300/人 | 居留申请前 | 根据年龄浮动 |\n 约单.xlsx》 |\n| 土耳其护照申请文件清单 | 《项目资料/护照/6.3 土耳其/5. 文件清单/土耳其护照申请文件清单.xlsx》 |\n| 土耳其护照合同 | 《项目资料/护照项目/ERP-土耳其护照合同/》 |\n| 土耳其项目Q&A | 《项目资料/护照/6.3 土耳其/0. 土耳其国家介绍（工具包）/土耳其项目Q&A.xlsx》 |\n\n---\n\n## 十三、执行时间轴\n\n### 13.1 三路径时间线对比\n\n| 步骤 | 基金 | 购房 | 存款 |\n|---|---|---|---|\n| 选标的 | 1-2周(基金) | 2-4周(选房) | 1周(银行) |\n| 完成投资 | 2-4周(认购) | 4-8周(过户) | 1-2周(存款) |\n| 提交申请 | 1-2周 | 1-2周 | 1-2周 |\n| 政府审批 | 3-5月 | 3-5月 | 3-5月 |\n| 获批+指纹 | 1-2周 | 1-2周 | 1-2周 |\n| 领取护照 | 2-4周 | 2-4周 | 2-4周 |\n\n![基金流程](flow-基金入籍.svg)\n\n### 13.2 标准执行路径\n\n| 时间 | 动作 | 责任方 | 交付物 |\n|---|---|---|---|\n| 第1周 | 客户信息收集、家庭成员确认、资金来源初审 | 顾问+客户 | 客户信息表、风险清单 |\n| 第1-2周 | 土耳其律师/项目方确认基金路径、报价、材料清单 | 顾问+律师+基金方 | 文件清单、费用表、服务合同 |\n| 第2-4周 | 准备公证认证材料、无犯罪、婚姻/出生证明 | 客户+律师 | 材料包 |\n| 第2-6周 | 基金尽调、基金文件审阅、认购协议确认 | 客户+律师+基金方 | 基金要素表、认购协议、托管信息 |\n| 第4-8周 | 签约、付款、完成基金认购 | 客户+律师+基金方 | 认购协议、付款凭证、份额确认 |\n| 第2-3月 | 申请投资者居留许可 | 律师 | 居留许可 |\n| 第3-6月 | 递交入籍申请、等待审批 | 律师 | 入籍申请回执 |\n| 第6-8月 | 获批、领取土耳其护照 | 客户+律师 | 护照/身份证明 |\n| 第8月后 | 若需E-2，启动美国商业计划和公司设立 | 美国律师+客户 | E-2商业计划与申请包 |\n| 锁定期满后 | 评估基金赎回或继续持有 | 客户+顾问+基金方 | 退出/续持方案 |\n\n### 13.3 详细办理流程图\n\n| 步骤 | 动作 | 责任方 | 输出 |\n|---|---|---|---|\n| 1 | 确认选择基金路径，读取基金要素表和快速签约单 | 顾问+客户 | 方案确认 |\n| 2 | 律师核对基金是否满足CMB监管和入籍法案要求 | 律师 | 合规确认 |\n| 3 | 客户准备主副申请人材料 | 客户 | 身份+婚姻+出生材料 |\n| 4 | 国内公证/认证/翻译 | 客户+公证机构 | 可递交文件包 |\n| 5 | 签署POA/认购协议 | 客户+律师 | 授权文件、认购文件 |\n| 6 | 付款至基金募集/托管账户 | 客户+银行 | 付款凭证 |\n| 7 | 完成基金份额确认与法案备案 | 基金方+律师 | 份额确认书 |\n| 8 | 递交居留许可申请 | 律师 | 居留申请回执 |\n| 9 | 录指纹、补件 | 客户+律师 | 录指纹记录/补件回执 |\n| 10 | 递交入籍申请 | 律师 | 入籍申请回执 |\n| 11 | 政府审批 | 移民局/相关政府部门 | 审批结果 |\n| 12 | 获批、领取土耳其护照/身份证明 | 客户+律师 | 护照、身份证明文件 |\n| 13 | 建立3年锁定退出提醒 | 顾问 | 退出与续持日程表 |\n\n\`\`\`text\n客户确认基金路径\n      ↓\n基金/律师尽调确认（CMB+入籍双重合规）\n      ↓\n准备家庭成员材料 + 公证认证\n      ↓\n签署POA与基金认购文件\n      ↓\n客户付款至基金募集/托管账户\n      ↓\n基金方确认到账并登记份额\n      ↓\n律师递交居留许可申请\n      ↓\n录指纹/补件\n      ↓\n律师递交入籍申请\n      ↓\n政府审批\n      ↓\n身份获批，领取土耳其护照\n      ↓\n建立锁定期与退出管理表\n\`\`\`\n\n### 13.4 本周立即行动清单\n\n| 编号 | 动作 | 目的 |\n|---|---|---|\n| 1 | 确认客户家庭成员年龄和是否随行 | 判断是否全部可同步入籍 |\n| 2 | 确认客户核心目标：护照/E-2/教育/资产/税务 | 避免路径错配 |\n| 3 | 确认资金来源和出境路径 | 排除P0合规风险 |\n| 4 | 调取项目资料基金费用清单、快速签约单和文件清单 | 形成正式报价和材料包 |\n| 5 | 联系土耳其律师核验最新基金路径和法案适配（CMB III-52.3） | 官方落地确认 |\n| 6 | 明确是否需要基金方/项目方说明会 | 决定是否启用基金尽调 |\n\n---\n\n## 十四、重要风险声明\n\n### 14.1 国籍风险\n\n**中国不承认双重国籍。** 客户取得土耳其国籍后，如在中国出入境或境内身份使用中发生交叉使用，可能触发国籍冲突和行政风险。土耳其护照只能作为境外功能性身份工具使用。\n\n### 14.2 基金合规风险\n\n**基金必须同时满足CMB/SPK监管要求和入籍法案要求。** 仅购买基金不等于自动入籍。需由土耳其律师逐一核验：①基金管理人是否为CMB持牌机构；②基金产品是否符合Communiqué III-52.3监管框架；③基金投资是否满足实施条例第20条第2款第(e)项要求；④托管银行和审计机构是否独立合规。\n\n### 14.3 基金退出风险\n\n**锁定期结束后的赎回价格、退出时间、基金资产变现能力均存在不确定性。** 不保证本金安全或收益。基金价值的波动取决于底层房地产资产组合的市场表现、管理人的运营能力和土耳其宏观经济环境。\n\n### 14.4 政策风险\n\n**土耳其投资入籍政策曾多次调整。** 2022年购房门槛由USD 250,000提高至USD 400,000。未来仍可能提高基金投资门槛、收紧审查或调整材料要求。正式签约前必须由土耳其律师核验最新法案。\n\n### 14.5 E-2风险\n\n**土耳其护照只是E-2资格前提之一，不代表自动获得美国E-2签证。** E-2要求真实美国投资、真实经营、非边缘企业、商业计划和持续运营。E-2不是绿卡，也不直接通向美国永久居民身份。通过投资入籍取得土耳其国籍者，可能需要满足在土连续居住/住所满3年方可申请E签证（Public Law 117-263）。\n\n### 14.6 税务风险\n\n**取得土耳其护照不等于改变中国税务居民身份，也不等于避税。** 若客户未来长期居住土耳其或美国，可能触发当地税务居民规则和全球收入申报义务。基金赎回收益可能涉及土耳其资本利得税。\n\n### 14.7 基金业绩风险\n\n**REIF基金的投资表现取决于底层资产和管理团队，不保证正收益。** 管理费、业绩报酬和赎回费用会侵蚀净回报。客户应以身份获取为首要目标，而非基金投资回报。\n\n### 14.8 资金出境风险\n\n**任何地下钱庄、虚假贸易、现金搬运、第三方不明代付都属于重大合规风险。** 本方案必须以可解释、可追踪、可留痕的资金路径为前提。\n\n---\n\n## 附件：引用法律法规与项目资料来源\n\n### A. 本次方案引用到的法律依据清单\n\n| 法案/规则 | 条款/款项 | 本次用途 | 最新更新时间 | 备注 |\n|---|---|---|---|---|\n| 《土耳其公民法》（Turkish Citizenship Law No. 5901） | 第12条：Exceptional acquisition of Turkish citizenship | 土耳其投资入籍的上位法依据 | 本次核验：2026-06 | 需结合实施条例适用 |\n| 《土耳其公民法实施条例》（Regulation on the Implementation of the Turkish Citizenship Law） | 第20条 | 规定投资入籍具体路径、门槛和确认机关 | 2022-05-13官方公报修订；2022-06-13生效 | 本方案核心执行条款 |\n| 《土耳其公民法实施条例》 | 第20条第2款第(e)项 | 规定房地产投资基金/风险投资基金份额：投资不少于USD 500,000并至少持有3年 | 本次核验：2026-06 | 本方案"土耳其基金移民"的直接条款依据 |\n| 《外国人和国际保护法》（Law No. 6458） | 第31条第1款第(j)项 | 投资人短期居留许可依据 | 本次核验：2026-06 | 居留许可与入籍申请衔接 |\n| 土耳其资本市场委员会 CMB/SPK《房地产投资基金公报》（Communiqué III-52.3） | REIF设立、运作、资产配置、基金管理规则 | 判断REIF是否为合规基金产品 | 2014-07-01生效；2024-07-17重要修订；2026-04-29进一步监管口径 | 基金路径必须核查基金是否在CMB监管框架内 |\n| 美国《移民与国籍法》（INA） | 101(a)(15)(E) | E-2条约投资人签证法源 | 本次核验：2026-06 | 土耳其护照衔接美国E-2的总依据 |\n| 美国国务院《外交事务手册》（9 FAM 402.9） | E-2签证审查标准 | E-2签证审查标准：条约国国籍、实质投资、真实企业等 | 2026-02-17刷新口径 | E-2不是绿卡，需独立商业计划 |\n| 美国Public Law 117-263相关E签证修订 | 金融投资取得条约国国籍者的3年居住/住所要求 | 影响通过投资入籍取得土国籍后立即申请E签证的可行性 | 2022-12-27生效 | 必须由美国移民律师专项判断 |\n| 《中华人民共和国国籍法》 | 第3条 | 中国不承认中国公民具有双重国籍 | 现行有效 | 土耳其允许双重国籍≠中国承认 |\n| 《中华人民共和国国籍法》 | 第9条 | 自愿加入外国国籍的自动丧失中国国籍 | 现行有效 | 属最高风险条款 |\n| 《中华人民共和国出境入境管理法》 | 相关条款 | 提醒第三国护照不得用于中国出入境切换 | 现行有效 | 出入境证件必须一致 |\n\n### B. 多个法案之间的相互影响\n\n| 组合 | 相互影响 | 需要注意的点 |\n|---|---|---|\n| 土耳其《公民法》+ 实施条例 + CMB基金规则 | 《公民法》给投资入籍入口，实施条例给投资门槛，CMB规则决定基金是否合规 | 三者必须同时满足；只买基金不等于自动入籍。 |\n| 实施条例第20条第2款第(e)项 + 基金锁定规则 | 投资基金份额需至少持有3年 | 3年内不得擅自赎回、转让或解除锁定。 |\n| 外国人和国际保护法第31条第1款第(j)项 + 入籍申请 | 投资人需先取得短期居留许可，再递交入籍 | 居留材料、保险、无犯罪、录指纹等不能跳过。 |\n| CMB基金规则 + 基金产品文件 | CMB监管框架是底层合规，基金要素表/认购协议是客户签约依据 | 需核查管理人、托管银行、审计机构、底层资产、管理费、退出条款。 |\n| 土耳其国籍 + 美国E-2 | 土耳其是E-2条约国，理论上可作为赴美跳板 | E-2需独立满足美国规则；注意投资入籍后的3年住所要求。 |\n| 美国E-2 + 中国国籍边界 | E-2申请可能使用土耳其国籍，但中国出入境仍涉及中国国籍法边界 | 不得把土耳其护照用于中国出入境切换。 |\n| 土耳其允许双重国籍 + 中国不承认双重国籍 | 两国国籍制度不一致 | 对客户表达必须使用"境外功能性身份"而非"中国承认双国籍"。 |\n| 土耳其身份 + 中国税务居民 | 获得土耳其护照不自动改变中国税务居民身份 | 全球资产、CRS、CFC、个人所得税仍需独立评估。 |\n\n### C. 法律适用注意事项\n\n1. **条款层级**：以《土耳其公民法》第12条为上位法，以实施条例第20条第2款第(e)项为基金路径依据。\n2. **基金路径必须双重核验**：既要核验是否满足入籍条例，也要核验基金是否符合CMB/SPK监管要求。\n3. **锁定期是身份安全阀**：3年内不得擅自退出，否则影响身份链条。\n4. **E-2不是自动收益**：土耳其护照只是E-2资格基础之一。\n5. **E-2三年住所要求需专项审查**：通过投资入籍取得土耳其国籍者，美国律师必须判断是否触发3年住所要求。\n6. **中国国籍风险不能淡化**：所有客户沟通必须避免承诺"双重国籍安全"。\n7. **出入境身份一致性**：中国出入境应保持中国护照一致。\n8. **税务和身份分开判断**：取得土耳其护照不等于改变税务居民身份。\n9. **最终落地三方确认**：土耳其律师确认法条和递交流程，基金方确认产品和托管文件，中国/国际税务师确认资金来源与税务后果。\n\n### D. 交付前客户需补充与确认资料\n\n1. 客户完整家庭信息与随行成员名单。\n2. 主申请人及随行成员护照、身份证、户口本、婚姻/出生证明。\n3. 资金来源证明、境内外账户流水与资金出境路径说明。\n4. 基金募集文件、认购协议、托管银行信息、审计机构信息、退出规则。\n5. 土耳其律师出具的最新材料清单和法案适配确认（CMB III-52.3双核验）。\n6. 如后续衔接美国E-2，需另行提供美国商业计划初稿和美国移民律师意见。\n`;
