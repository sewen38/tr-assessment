<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 580" font-family="-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b1e1e"/><stop offset="100%" stop-color="#c9302c"/></linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="opt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="580" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Node 1: 中国事业主体 -->
  <rect x="180" y="25" width="400" height="52" rx="12" fill="url(#top)" filter="url(#shadow)"/>
  <text x="380" y="48" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🏢 中国事业主体 / 家庭资产</text>
  <text x="380" y="65" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">事业国 · 赚钱地</text>

  <!-- Arrow 1 -->
  <line x1="380" y1="77" x2="380" y2="115" stroke="#8b1e1e" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <defs><marker id="arrowR" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#8b1e1e"/></marker></defs>

  <!-- Label on arrow -->
  <rect x="392" y="84" width="110" height="24" rx="6" fill="#fef3c7"/>
  <text x="447" y="101" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">↓ 合规资金路径</text>

  <!-- Node 2: 境外平台 -->
  <rect x="145" y="120" width="470" height="65" rx="12" fill="url(#mid)" filter="url(#shadow)"/>
  <text x="380" y="146" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🏦 香港 / 新加坡 / 迪拜 账户或控股平台</text>
  <text x="380" y="164" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">管钱地 · 境外资产管理中心</text>
  <text x="380" y="178" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">ODI / 家庭换汇 / 境外存量 / 分红路径</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="185" x2="380" y2="218" stroke="#1e40af" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <defs><marker id="arrowB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#1e40af"/></marker></defs>
  <rect x="392" y="190" width="130" height="24" rx="6" fill="#dbeafe"/>
  <text x="457" y="207" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">↓ 支付购房款</text>

  <!-- Node 3: 土耳其房产 -->
  <rect x="130" y="225" width="500" height="78" rx="12" fill="url(#main)" filter="url(#shadow)"/>
  <text x="380" y="252" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🏠 土耳其合规房产（入籍资产）</text>
  <text x="380" y="272" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="600">购买价 ≥ USD 400,000 · 美元计价 · 持有至少 3 年</text>
  <text x="380" y="290" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="11">TAPU 登记产权 + 3年不出售限制 + 官方评估报告</text>

  <!-- Arrow 3 -->
  <line x1="380" y1="303" x2="380" y2="340" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrowO)"/>
  <defs><marker id="arrowO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#b45309"/></marker></defs>
  <rect x="392" y="310" width="100" height="24" rx="6" fill="#fef3c7"/>
  <text x="442" y="327" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">↓ 3年后出售退出</text>

  <!-- Split -->
  <line x1="380" y1="345" x2="380" y2="370" stroke="#b45309" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="220" y1="370" x2="540" y2="370" stroke="#b45309" stroke-width="2"/>
  
  <!-- Left branch: 回收本金 -->
  <line x1="220" y1="370" x2="220" y2="400" stroke="#b45309" stroke-width="2" marker-end="url(#arrowO)"/>
  <rect x="145" y="405" width="150" height="44" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="425" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">💰 收回本金</text>
  <text x="220" y="441" text-anchor="middle" fill="#a16207" font-size="10">美元计价房产变现</text>

  <!-- Right branch: E-2 -->
  <line x1="540" y1="370" x2="540" y2="400" stroke="#047857" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#047857"/></marker></defs>
  <rect x="465" y="405" width="150" height="44" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="425" text-anchor="middle" fill="#047857" font-size="13" font-weight="700">🇺🇸 美国 E-2</text>
  <text x="540" y="441" text-anchor="middle" fill="#065f46" font-size="10">土耳其护照 + 美国经营</text>

  <!-- Bottom note -->
  <rect x="60" y="470" width="640" height="50" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="490" text-anchor="middle" fill="#6b7280" font-size="11">
    三重定位：🏢 事业国 = 中国（主营业务） ｜ 💰 管钱地 = 香港/新加坡/迪拜 ｜ 🏠 入籍资产 = 土耳其房产 ｜ 🇺🇸 居住国（可选）= 美国 E-2
  </text>
  <text x="380" y="509" text-anchor="middle" fill="#9ca3af" font-size="10">
    ⚠️ 3年内不得出售/转让 ｜ 退出时关注资本利得税（持有满5年免征） ｜ E-2需独立商业计划
  </text>

  <!-- Title -->
  <text x="380" y="560" text-anchor="middle" fill="#9ca3af" font-size="10">土耳其购房入籍 · 财富架构图</text>
</svg>